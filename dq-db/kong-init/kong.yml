_format_version: "3.0"
_transform: true

# Kong declarative configuration for DQ API Gateway
# This file is automatically loaded by Kong at startup

services:
  - name: dq-api
    url: http://api:4001
    protocol: http
    host: api
    port: 4001
    connect_timeout: 60000
    write_timeout: 60000
    read_timeout: 60000
    retries: 5
    enabled: true

    routes:
      - name: dq-api-v1
        paths:
          - /v1
        methods:
          - GET
          - POST
          - PUT
          - DELETE
          - PATCH
          - OPTIONS
        path_handling: v1
        strip_path: false
        protocols:
          - http
          - https

    plugins:
      # CORS Plugin - allows cross-origin requests from frontend
      - name: cors
        config:
          origins:
            - "http://dq-made-easy.local:5173"
            - "http://dq-made-easy.local:5174"
            - "http://localhost:5173"
            - "http://127.0.0.1:5173"
            - "http://localhost:3000"
          methods:
            - GET
            - POST
            - PUT
            - DELETE
            - PATCH
            - OPTIONS
          headers:
            - Accept
            - Accept-Version
            - Content-Length
            - Content-MD5
            - Content-Type
            - Date
            - X-Auth-Token
            - Authorization
            - X-Correlation-ID
            - traceparent
            - tracestate
            - baggage
          exposed_headers:
            - X-Kong-Response-Latency
            - X-Kong-Upstream-Latency
            - X-Correlation-ID
            - X-Trace-ID
          credentials: true
          max_age: 3600

      # Rate Limiting Plugin - protects API from abuse
      - name: rate-limiting
        config:
          minute: 1000
          hour: 50000
          policy: local
          fault_tolerant: true
          hide_client_headers: false

      # Request Transformer - adds/modifies request data
      - name: request-transformer
        config:
          add:
            headers:
              - X-Kong-Forwarded-For: $(client_ip)

      # Response Transformer - enhances response metadata
      - name: response-transformer
        config:
          add:
            headers:
              - X-Powered-By: Kong/DQ-API

      # Prometheus - metrics collection for monitoring
      - name: prometheus
        config:
          metrics:
            - request_count
            - request_size
            - response_size
            - latency
            - upstream_latency
            - kong_latency
            - request_time
