# ============================================================================
# LLM: Language Model services
# ============================================================================

services:
  dq-made-easy-llm:
    profiles: ["llm"]
    image: ${DQ_LLM_REGISTRY}${DQ_LLM_NAMESPACE}${DQ_LLM_IMAGE}:${DQ_LLM_TAG}
    build:
      context: ../dq-llm
      dockerfile: Dockerfile.llm
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
    env_file: ${ROOT_ENV_FILE:-.env}
    ports:
      - "${DQ_LLM_HOST_BIND:-127.0.0.1}:${DQ_LLM_HOST_PORT:-8123}:8000"
    volumes:
      - dq-made-easy-llm-hf-cache:/cache/huggingface:delegated
      - dq-made-easy-llm-model-cache:/hf_cache_temp:tmpfs
      - ../tmp/certs/services/llm:/etc/dq-llm/certs:ro
      - ../tmp/certs/mkcert-rootCA.pem:/etc/dq-llm/mkcert-rootCA.pem:ro
      - ../tmp/certs/trust/internal-ca-bundle.pem:/etc/internal-certs/internal-ca-bundle.pem:ro
    networks:
      - dq-network
    deploy:
      resources:
        limits:
          memory: ${DQ_LLM_MEMORY_LIMIT:-8G}
          cpus: "${DQ_LLM_CPUS:-4}"
        reservations:
          memory: ${DQ_LLM_MEMORY_RES:-4G}
          cpus: "${DQ_LLM_CPU_RES:-2}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import ssl, urllib.request; ctx = ssl.create_default_context(cafile='/etc/dq-llm/mkcert-rootCA.pem'); urllib.request.urlopen('https://127.0.0.1:8000/health', context=ctx)\" || exit 1"]
      interval: 10s
      timeout: 30s
      retries: 10
      start_period: 120s
