# ============================================================================
# BASE: Shared configurations (volumes, networks, secrets)
# ============================================================================

# ============================================================================
# SERVICES: Foundation services
# ============================================================================
services:
  trust-bundle:
    profiles: ["trust", "auth", "gateway", "core", "observability", "support", "airflow"]
    build:
      context: ..
      dockerfile: docker/trust-bundle/Dockerfile
    volumes:
      - ../tmp:/workspace-tmp
    networks:
      - dq-network
    restart: "no"

# ============================================================================
# VOLUMES: Persistent storage for all services
# ============================================================================
volumes:
  loki_data:
    driver: local
  prometheus_data:
    driver: local
  tempo_data:
    driver: local
  grafana_data:
    driver: local
  aistor_data:
    driver: local
  dq-made-easy-llm-model-cache:
  pgdata_v18:
  keycloak_data:
  keycloak_seed_artifacts:
  redis_data:
  zammad_postgresql_data:
  zammad_redis_data:
  zammad_storage:
  zammad_backup:
  kong-db-data-v17:
  openmetadata_pgdata_v18:
  openmetadata_search_data:
  openmetadata_search_v9_data:
  spark-jars:
  ivy2_cache:
  dq-made-easy-llm-hf-cache:
  kafka_data:

# ============================================================================
# SECRETS: Shared secrets for all services
# ============================================================================
secrets:
  repo_npmrc:
    file: ${REPO_NPMRC_FILE:-./.npmrc}
  internal_mkcert_root_ca:
    file: ./tmp/certs/trust/internal-ca-bundle.pem
  internal_root_ca:
    file: ${INTERNAL_ROOT_CA_FILE:-./tmp/certs/trust/internal-ca-bundle.pem}
  internal_corporate_root_ca:
    file: ${INTERNAL_CORPORATE_ROOT_CA_FILE:-./tmp/certs/trust/internal-ca-bundle.pem}
  internal_ca_bundle:
    file: ${INTERNAL_CA_BUNDLE_FILE:-./tmp/certs/trust/internal-ca-bundle.pem}

# ==============================================================================
# NETWORK: Shared network for all services
# ==============================================================================
networks:
  dq-network:
    external: false
    name: dq-network

