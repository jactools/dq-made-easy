# ============================================================================
# AUTH: Authentication (Keycloak)
# ============================================================================

services:
  keycloak-seed-artifacts:
    depends_on:
      trust-bundle:
        condition: service_completed_successfully

    profiles: ["auth", "gateway"]
    build:
      context: ..
      dockerfile: dq-keycloak/Dockerfile.keycloak.seed
    environment:
      ENVIRONMENT: ${ENVIRONMENT?ENVIRONMENT is required}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM?KEYCLOAK_REALM is required}
      KEYCLOAK_REALM_DISPLAY_NAME: ${KEYCLOAK_REALM_DISPLAY_NAME:?KEYCLOAK_REALM_DISPLAY_NAME is required}
      KEYCLOAK_JACCLOUD_USERNAME: ${KEYCLOAK_JACCLOUD_USERNAME?KEYCLOAK_JACCLOUD_USERNAME is required}
      SMOKE_LOGIN_EMAIL: ${SMOKE_LOGIN_EMAIL?SMOKE_LOGIN_EMAIL is required}
      OPERATOR_LOGIN_EMAIL: ${OPERATOR_LOGIN_EMAIL:?OPERATOR_LOGIN_EMAIL is required}
      AUDITOR_LOGIN_EMAIL: ${AUDITOR_LOGIN_EMAIL:?AUDITOR_LOGIN_EMAIL is required}
      REGULATOR_LOGIN_EMAIL: ${REGULATOR_LOGIN_EMAIL:?REGULATOR_LOGIN_EMAIL is required}
      OIDC_REDIRECT_BASE_URL: ${OIDC_REDIRECT_BASE_URL:?OIDC_REDIRECT_BASE_URL is required}
      KONG_PUBLIC_URL: ${KONG_PUBLIC_URL?KONG_PUBLIC_URL is required}
      EDGE_LOCAL_SUPPORT_HOST: ${EDGE_LOCAL_SUPPORT_HOST?EDGE_LOCAL_SUPPORT_HOST is required}
      UI_VITE_LOCAL_URL: ${UI_VITE_LOCAL_URL?UI_VITE_LOCAL_URL is required}
      UI_NGINX_LOCAL_URL: ${UI_NGINX_LOCAL_URL?UI_NGINX_LOCAL_URL is required}
      ZAMMAD_PUBLIC_URL: ${ZAMMAD_PUBLIC_URL:?ZAMMAD_PUBLIC_URL is required}
      OPENMETADATA_CALLBACK: ${OPENMETADATA_CALLBACK:?OPENMETADATA_CALLBACK is required}
      GRAFANA_PUBLIC_URL: ${GRAFANA_PUBLIC_URL:?GRAFANA_PUBLIC_URL is required}
      GRAFANA_OIDC_SECRET: ${GRAFANA_OIDC_SECRET:?GRAFANA_OIDC_SECRET is required}
      DQ_ENGINE_OIDC_CLIENT_ID: ${DQ_ENGINE_OIDC_CLIENT_ID?DQ_ENGINE_OIDC_CLIENT_ID is required}
      DQ_ENGINE_OIDC_CLIENT_SECRET: ${DQ_ENGINE_OIDC_CLIENT_SECRET:?DQ_ENGINE_OIDC_CLIENT_SECRET is required}
    volumes:
      - keycloak_seed_artifacts:/seed-data
      - ../tmp:/workspace-tmp
    networks:
      - dq-network
    restart: "no"

  keycloak:
    profiles: ["auth", "gateway"]
    image: ${DQ_KEYCLOAK_REGISTRY:?DQ_KEYCLOAK_REGISTRY is required}${DQ_KEYCLOAK_NAMESPACE:?DQ_KEYCLOAK_NAMESPACE is required}${DQ_KEYCLOAK_IMAGE:?DQ_KEYCLOAK_IMAGE is required}:${DQ_KEYCLOAK_TAG:?DQ_KEYCLOAK_TAG is required}
    build:
      context: ../dq-keycloak
      dockerfile: Dockerfile.keycloak
    depends_on:
      keycloak-seed-artifacts:
        condition: service_completed_successfully
      trust-bundle:
        condition: service_completed_successfully
    environment:
      KEYCLOAK_SYSTEM_ADMIN_USERNAME: ${KEYCLOAK_SYSTEM_ADMIN_USERNAME:?KEYCLOAK_SYSTEM_ADMIN_USERNAME is required}
      KEYCLOAK_SYSTEM_ADMIN_PASSWORD: ${KEYCLOAK_SYSTEM_ADMIN_PASSWORD:?KEYCLOAK_SYSTEM_ADMIN_PASSWORD is required}
      OIDC_REDIRECT_BASE_URL: ${OIDC_REDIRECT_BASE_URL?OIDC_REDIRECT_BASE_URL is required}
      KONG_PUBLIC_URL: ${KONG_PUBLIC_URL?KONG_PUBLIC_URL is required}
      ZAMMAD_PUBLIC_URL: ${ZAMMAD_PUBLIC_URL:?ZAMMAD_PUBLIC_URL is required}
      GRAFANA_PUBLIC_URL: ${GRAFANA_PUBLIC_URL:?GRAFANA_PUBLIC_URL is required}
      GRAFANA_OIDC_REALM_ROLE: ${GRAFANA_OIDC_REALM_ROLE:?GRAFANA_OIDC_REALM_ROLE is required}
      DQ_ENGINE_OIDC_CLIENT_ID: ${DQ_ENGINE_OIDC_CLIENT_ID?DQ_ENGINE_OIDC_CLIENT_ID is required}
      DQ_ENGINE_OIDC_REALM_ROLE: ${DQ_ENGINE_OIDC_REALM_ROLE:?DQ_ENGINE_OIDC_REALM_ROLE is required}
      UI_VITE_LOCAL_URL: ${UI_VITE_LOCAL_URL?UI_VITE_LOCAL_URL is required}
      UI_NGINX_LOCAL_URL: ${UI_NGINX_LOCAL_URL?UI_NGINX_LOCAL_URL is required}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER:?KEYCLOAK_ADMIN_USER is required}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASS:?KEYCLOAK_ADMIN_PASS is required}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:?KEYCLOAK_REALM is required}
      KEYCLOAK_HTTPS_RELATIVE_PATH: ${KEYCLOAK_HTTPS_RELATIVE_PATH:?KEYCLOAK_HTTPS_RELATIVE_PATH is required}
      KEYCLOAK_HTTPS_CERT_FILE: ${KEYCLOAK_HTTPS_CERT_FILE:?KEYCLOAK_HTTPS_CERT_FILE is required}
      KEYCLOAK_HTTPS_KEY_FILE: ${KEYCLOAK_HTTPS_KEY_FILE:?KEYCLOAK_HTTPS_KEY_FILE is required}
      KEYCLOAK_HTTPS_KEYSTORE_FILE: /opt/keycloak/keystore/keycloak.p12
      KEYCLOAK_HTTPS_KEYSTORE_PASSWORD: ${KEYCLOAK_HTTPS_KEYSTORE_PASSWORD:?KEYCLOAK_HTTPS_KEYSTORE_PASSWORD is required}
    command: ["start-dev", "--import-realm", "--https-port=8443", "--https-certificate-file=/opt/keycloak/certs/keycloak.pem", "--https-certificate-key-file=/opt/keycloak/certs/keycloak-key.pem", "--http-relative-path=${KEYCLOAK_HTTPS_RELATIVE_PATH:?KEYCLOAK_HTTPS_RELATIVE_PATH is required}", "--hostname=${KEYCLOAK_PUBLIC_HOSTNAME:?KEYCLOAK_PUBLIC_HOSTNAME is required}", "--hostname-strict=false"]
    ports:
      - "${KEYCLOAK_HTTPS_HOST_BIND:?KEYCLOAK_HTTPS_HOST_BIND is required}:${KEYCLOAK_HTTPS_HOST_PORT:?KEYCLOAK_HTTPS_HOST_PORT is required}:8443"
    volumes:
      - keycloak_data:/opt/keycloak/data
      - keycloak_seed_artifacts:/opt/keycloak/realm-import:ro
      - ../tmp/certs/${KEYCLOAK_HTTPS_CERT_FILE:?KEYCLOAK_HTTPS_CERT_FILE is required}:/opt/keycloak/certs/keycloak.pem:ro
      - ../tmp/certs/${KEYCLOAK_HTTPS_KEY_FILE:?KEYCLOAK_HTTPS_KEY_FILE is required}:/opt/keycloak/certs/keycloak-key.pem:ro
      - ../tmp/certs/trust:/certs/trust:ro
    networks:
      - dq-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/opt/keycloak/bin/kc.sh --version >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

