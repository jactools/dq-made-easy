services:
  base:
    depends_on:
      trust-bundle:
        condition: service_completed_successfully
    profiles:
    - base
    image: ${DQ_BASE_REGISTRY:-}${DQ_BASE_NAMESPACE:-}${DQ_BASE_IMAGE:-}:${DQ_BASE_TAG:-}
    build:
      context: ../dq-base
      dockerfile: Dockerfile.base
      args:
        NODE_REGISTRY: ${NODE_REGISTRY:-}
        NODE_NAMESPACE: ${NODE_NAMESPACE:-}
        NODE_IMAGE: ${NODE_IMAGE:-}
        NODE_TAG: ${NODE_TAG:-}
    networks:
    - dq-network
  db:
    depends_on:
      trust-bundle:
        condition: service_completed_successfully
    profiles:
    - core
    - gateway
    - engine
    - profiling
    - observability
    image: ${DQ_DB_REGISTRY:-}${DQ_DB_NAMESPACE:-}${DQ_DB_IMAGE:-dq-made-easy-db}:${DQ_DB_TAG:-latest}
    container_name: dq-made-easy-db
    build:
      context: ../dq-db
      dockerfile: Dockerfile.db
    command:
    - postgres
    - -c
    - shared_preload_libraries=pg_stat_statements
    - -c
    - ssl=on
    - -c
    - ssl_cert_file=/etc/postgresql/certs/tls.crt
    - -c
    - ssl_key_file=/etc/postgresql/certs/tls.key
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dq
      TZ: UTC
    ports:
    - ${DB_HOST_BIND:-}:${DB_HOST_PORT:-}:5432
    volumes:
    - ../tmp/certs/services/db:/etc/postgresql/certs:ro
    - ../tmp/certs/mkcert-rootCA.pem:/etc/postgresql/internal-ca-bundle.pem:ro
    - pgdata_v18:/var/lib/postgresql
    restart: unless-stopped
    networks:
    - dq-network
    healthcheck:
      test:
      - CMD-SHELL
      - PGPASSWORD=postgres psql 'host=localhost port=5432 dbname=dq user=postgres
        sslmode=verify-full sslrootcert=/etc/postgresql/internal-ca-bundle.pem' -c
        'select 1' >/dev/null
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
  redis:
    depends_on:
      trust-bundle:
        condition: service_completed_successfully
    profiles:
    - redis
    - core
    - gateway
    - observability
    - support
    image: ${REDIS_REGISTRY:-}${REDIS_NAMESPACE:-}${REDIS_IMAGE:-}:${REDIS_TAG:-}
    container_name: dq-made-easy-redis
    ports:
    - ${REDIS_HOST_BIND:-}:${REDIS_HOST_PORT:-}:6379
    command:
    - redis-server
    - --port
    - '0'
    - --tls-port
    - '6379'
    - --tls-cert-file
    - /etc/redis/certs/tls.crt
    - --tls-key-file
    - /etc/redis/certs/tls.key
    - --tls-ca-cert-file
    - /etc/redis/internal-ca-bundle.pem
    - --tls-auth-clients
    - 'no'
    - --appendonly
    - 'yes'
    volumes:
    - ../tmp/certs/services/redis:/etc/redis/certs:ro
    - ../tmp/certs/mkcert-rootCA.pem:/etc/redis/internal-ca-bundle.pem:ro
    - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test:
      - CMD-SHELL
      - redis-cli --tls --cacert /etc/redis/internal-ca-bundle.pem -h localhost -p
        6379 ping
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
    - dq-network
  kafka:
    depends_on:
      trust-bundle:
        condition: service_completed_successfully
    profiles:
    - engine
    - core
    - gateway
    - observability
    image: ${DQ_KAFKA_REGISTRY:-}${DQ_KAFKA_NAMESPACE:-}${DQ_KAFKA_IMAGE:-dq-made-easy-kafka}:${DQ_KAFKA_TAG:-latest}
    build:
      context: ../dq-kafka
      dockerfile: Dockerfile.kafka
    container_name: dq-made-easy-kafka
    environment:
      TZ: UTC
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: SSL://:9092,BROKER://:9094,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: SSL://${KAFKA_ADVERTISED_HOST:-}:${KAFKA_HOST_PORT:-},BROKER://kafka:9094
      KAFKA_CERT_HOST: ${KAFKA_CERT_HOST?KAFKA_CERT_HOST is required}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,SSL:SSL,BROKER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: BROKER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_SSL_KEYSTORE_FILENAME: kafka.keystore.p12
      KAFKA_SSL_KEYSTORE_CREDENTIALS: kafka_keystore_creds
      KAFKA_SSL_KEY_CREDENTIALS: kafka_key_creds
      KAFKA_SSL_KEYSTORE_TYPE: PKCS12
      KAFKA_SSL_CLIENT_AUTH: none
      KAFKA_TLS_ENABLED: ${KAFKA_TLS_ENABLED:-}
      KAFKA_TLS_KEYSTORE_PASSWORD: ${KAFKA_TLS_KEYSTORE_PASSWORD:-}
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    command:
    - /opt/kafka/bin/start-kafka.sh
    ports:
    - ${KAFKA_HOST_BIND:-}:${KAFKA_HOST_PORT:-}:9092
    volumes:
    - kafka_data:/var/lib/kafka/data
    - ../tmp/certs:/etc/kafka/certs:ro
    networks:
    - dq-network
    restart: unless-stopped
    healthcheck:
      test:
      - CMD-SHELL
      - echo | openssl s_client -connect ${KAFKA_HEALTHCHECK_HOST:-}:${KAFKA_HOST_PORT:-}
        -servername ${KAFKA_CERT_HOST:-} -CAfile /etc/kafka/certs/mkcert-rootCA.pem
        >/dev/null 2>&1 || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
  api-migrate:
    depends_on:
      db:
        condition: service_healthy
      trust-bundle:
        condition: service_completed_successfully
    profiles:
    - core
    - gateway
    - observability
    image: ${DQ_API_REGISTRY}${DQ_API_NAMESPACE}${DQ_API_IMAGE}:${DQ_API_TAG:-latest}
    environment:
      COMPOSE_DATABASE_URL: ${DQ_DB_INTERNAL_URL:?DQ_DB_INTERNAL_URL is required}}
      ENVIRONMENT: ${ENVIRONMENT:?ENVIRONMENT is required}}
      TZ: UTC
      DQ_DB_INTERNAL_URL: ${DQ_DB_INTERNAL_URL:?DQ_DB_INTERNAL_URL is required}}
      REQUIRE_DATABASE: 'true'
    build:
      context: ..
      dockerfile: dq-api/Dockerfile.fastapi
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
    entrypoint:
    - /bin/sh
    - -lc
    command:
    - cd /app && python -m alembic -c alembic.ini upgrade heads
    env_file: ../${ROOT_ENV_FILE:?ROOT_ENV_FILE is required}
    networks:
    - dq-network
    restart: 'no'
  api:
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      api-migrate:
        condition: service_completed_successfully
      trust-bundle:
        condition: service_completed_successfully
    profiles:
    - core
    - gateway
    - observability
    image: ${DQ_API_REGISTRY}${DQ_API_NAMESPACE}${DQ_API_IMAGE}:${DQ_API_TAG:-latest}
    environment:
      COMPOSE_DATABASE_URL: ${DQ_DB_INTERNAL_URL:?DQ_DB_INTERNAL_URL is required}}
      ENVIRONMENT: ${ENVIRONMENT:?ENVIRONMENT is required}}
      TZ: UTC
      DQ_DB_INTERNAL_URL: ${DQ_DB_INTERNAL_URL:?DQ_DB_INTERNAL_URL is required}}
      APP_CONFIG_ENCRYPTION_KEY: ${APP_CONFIG_ENCRYPTION_KEY?APP_CONFIG_ENCRYPTION_KEY
        is required}
      REQUIRE_DATABASE: 'true'
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: rediss://redis:6379/0?ssl_cert_reqs=required&ssl_ca_certs=/etc/openmetadata/certs/internal-ca-bundle.pem&ssl_check_hostname=true
      PROFILING_QUEUE_KEY: ${PROFILING_QUEUE_KEY:-}
      GX_EXECUTION_QUEUE_KEY: ${GX_EXECUTION_QUEUE_KEY:-}
      GX_JOIN_PAIR_MATERIALIZATION_QUEUE_KEY: ${GX_JOIN_PAIR_MATERIALIZATION_QUEUE_KEY:-}
      DQ_PROFILING_LOCAL_QUEUE: dq-made-easy-profiling:local-queue
      SSO_INTERNAL_ISSUER: ${SSO_INTERNAL_ISSUER_URL?SSO_INTERNAL_ISSUER_URL is required}
      KEYCLOAK_SYSTEM_ADMIN_USERNAME: ${KEYCLOAK_SYSTEM_ADMIN_USERNAME:?KEYCLOAK_SYSTEM_ADMIN_USERNAME
        is required}}
      KEYCLOAK_SYSTEM_ADMIN_PASSWORD: ${KEYCLOAK_SYSTEM_ADMIN_PASSWORD:?KEYCLOAK_SYSTEM_ADMIN_PASSWORD
        is required}}
      SSO_PROVIDER: ${SSO_PROVIDER:-}
      SSO_ISSUER: ${SSO_PUBLIC_ISSUER_URL?SSO_PUBLIC_ISSUER_URL is required}
      SSO_CLIENT_ID: ${SSO_CLIENT_ID:?SSO_CLIENT_ID is required}}
      SSO_ALLOWED_CLIENT_IDS: ${SSO_ALLOWED_CLIENT_IDS:-dq-rules-ui,dq-made-easy-engine-gx-worker,grafana}
      SSO_ENABLED: ${SSO_ENABLED:-true}
      ALLOW_LOCAL_AUTH: ${ALLOW_LOCAL_AUTH:-}
      CATALOG_PROVIDER: ${CATALOG_PROVIDER:-openmetadata}
      CATALOG_ENDPOINT: ${CATALOG_ENDPOINT:-https://openmetadata-server:8585/api}
      CATALOG_API_KEY: ${CATALOG_API_KEY:-}
      CATALOG_OIDC_ISSUER: ${CATALOG_OIDC_ISSUER:-https://keycloak:8443/realms/jaccloud}
      CATALOG_OIDC_TOKEN_URL: ${CATALOG_OIDC_TOKEN_URL:-https://keycloak:8443/realms/jaccloud/protocol/openid-connect/token}
      CATALOG_OIDC_CLIENT_ID: ${CATALOG_OIDC_CLIENT_ID:-openmetadata}
      CATALOG_OIDC_CLIENT_SECRET: ${CATALOG_OIDC_CLIENT_SECRET:-}
      CATALOG_OIDC_SCOPE: ${CATALOG_OIDC_SCOPE:-}
      CATALOG_OIDC_USERNAME: ${CATALOG_OIDC_USERNAME:-${SMOKE_LOGIN_EMAIL:-dq-admin@jaccloud.nl}}
      CATALOG_OIDC_PASSWORD: ${CATALOG_OIDC_PASSWORD:-${SMOKE_LOGIN_PASSWORD:-${KEYCLOAK_JACCLOUD_PASSWORD:-password}}}
      TRUST_PROXY_AUTH: ${TRUST_PROXY_AUTH:-false}
      GX_EXCEPTION_STORAGE_BACKEND: ${GX_EXCEPTION_STORAGE_BACKEND:-s3}
      GX_EXCEPTION_STORAGE_BUCKET: ${GX_EXCEPTION_STORAGE_BUCKET:-dq-gx-exceptions}
      GX_EXCEPTION_STORAGE_PREFIX: ${GX_EXCEPTION_STORAGE_PREFIX:-gx-exceptions}
      GX_EXCEPTION_STORAGE_ENDPOINT: ${GX_EXCEPTION_STORAGE_ENDPOINT:-}
      GX_EXCEPTION_STORAGE_ACCESS_KEY: ${GX_EXCEPTION_STORAGE_ACCESS_KEY:-}
      GX_EXCEPTION_STORAGE_SECRET_KEY: ${GX_EXCEPTION_STORAGE_SECRET_KEY:-}
      GX_EXCEPTION_STORAGE_REGION: ${GX_EXCEPTION_STORAGE_REGION:-us-east-1}
      GX_EXCEPTION_STORAGE_SSL_ENABLED: ${GX_EXCEPTION_STORAGE_SSL_ENABLED:-false}
      DQ_ENGINE_INTERNAL_URL: ${DQ_ENGINE_INTERNAL_URL:-}
      KONG_PUBLIC_URL: ${KONG_PUBLIC_URL?KONG_PUBLIC_URL is required}
      OIDC_REDIRECT_BASE_URL: ${OIDC_REDIRECT_BASE_URL:-}
      DQ_LLM_BASE_URL: ${DQ_LLM_BASE_URL:-https://dq-made-easy-llm:8000}
      DQ_LLM_CA_BUNDLE: /etc/api/mkcert-rootCA.pem
      REDIS_CA_BUNDLE: /etc/api/mkcert-rootCA.pem
      REQUESTS_CA_BUNDLE: /etc/api/mkcert-rootCA.pem
      SSL_CERT_FILE: /etc/api/mkcert-rootCA.pem
      OTEL_SERVICE_NAME: dq-made-easy-api
      OTEL_SERVICE_VERSION: ${DQ_API_TAG:-dev}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_CONSOLE_EXPORT: '1'
      OTEL_EXPORTER_OTLP_FORCE: '1'
      OTEL_TRACE_EXPORT_DEBUG: '1'
      OTEL_TRACES_SAMPLER: parentbased_traceidratio
      OTEL_TRACES_SAMPLER_ARG: '1.0'
      KEYCLOAK_TOKEN_REALM: ${KEYCLOAK_TOKEN_REALM:-}
    build:
      context: ..
      dockerfile: dq-api/Dockerfile.fastapi
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
    ports:
    - ${API_HOST_BIND:-}:${API_HOST_PORT:-}:4010
    env_file: ../${ROOT_ENV_FILE:?ROOT_ENV_FILE is required}
    volumes:
    - ../tmp/certs/services/api:/etc/api/certs:ro
    - ../tmp/certs/mkcert-rootCA.pem:/etc/api/mkcert-rootCA.pem:ro
    - ../tmp/certs/trust/internal-ca-bundle.pem:/etc/openmetadata/certs/internal-ca-bundle.pem:ro
    networks:
    - dq-network
    restart: unless-stopped
    healthcheck:
      test:
      - CMD-SHELL
      - python -c "import ssl, urllib.request; ctx = ssl.create_default_context(cafile='/etc/openmetadata/certs/internal-ca-bundle.pem');
        urllib.request.urlopen('https://127.0.0.1:4010/health', context=ctx)" || exit
        1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
  frontend:
    depends_on:
      api:
        condition: service_healthy
      trust-bundle:
        condition: service_completed_successfully
    profiles:
    - core
    image: ${DQ_FRONTEND_REGISTRY}${DQ_FRONTEND_NAMESPACE}${DQ_FRONTEND_IMAGE}:${DQ_FRONTEND_TAG:-latest}
    build:
      context: ../dq-ui
      dockerfile: Dockerfile.frontend
      args:
        NODE_REGISTRY: ${NODE_REGISTRY:-}
        NODE_NAMESPACE: ${NODE_NAMESPACE:-}
        NODE_IMAGE: ${NODE_IMAGE:-}
        NODE_TAG: ${NODE_TAG:-}
        NGINX_REGISTRY: ${NGINX_REGISTRY:-}
        NGINX_NAMESPACE: ${NGINX_NAMESPACE:-}
        NGINX_IMAGE: ${NGINX_IMAGE:-}
        NGINX_TAG: ${NGINX_TAG:-}
        VITE_OTEL_ENABLED: ${VITE_OTEL_ENABLED:-false}
        VITE_OTEL_ENDPOINT: ${VITE_OTEL_ENDPOINT:-}
        VITE_ENVIRONMENT: ${ENVIRONMENT:?ENVIRONMENT is required}}
        VITE_SERVICE_VERSION: ${DQ_FRONTEND_TAG:-dev}
      secrets:
      - repo_npmrc
    ports:
    - ${FRONTEND_HOST_BIND:-}:${FRONTEND_HTTPS_HOST_PORT:-}:443
    environment:
      KONG_PUBLIC_URL: ${KONG_PUBLIC_URL?KONG_PUBLIC_URL is required}
      VITE_SSO_PROVIDER: ${VITE_SSO_PROVIDER:-}
      VITE_SSO_ISSUER_URL: ${SSO_PUBLIC_ISSUER_URL?SSO_PUBLIC_ISSUER_URL is required}
      VITE_SSO_CLIENT_ID: ${VITE_SSO_CLIENT_ID:-}
      VITE_OTEL_ENABLED: ${VITE_OTEL_ENABLED:-false}
      VITE_OTEL_ENDPOINT: ${VITE_OTEL_ENDPOINT:-}
      OTEL_SERVICE_NAME: dq-ui
      OTEL_SERVICE_VERSION: ${DQ_FRONTEND_TAG:-dev}
      ENVIRONMENT: ${ENVIRONMENT:?ENVIRONMENT is required}}
    volumes:
    - ../tmp/certs:/etc/nginx/certs:ro
    networks:
    - dq-network
    restart: unless-stopped
    healthcheck:
      test:
      - CMD-SHELL
      - curl -fk https://127.0.0.1/ || exit 1
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
