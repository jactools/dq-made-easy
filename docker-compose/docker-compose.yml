# Docker Compose - Modular Configuration
# Main entry point: includes all service modules via docker compose include.
#
# Usage:
#   docker compose -f docker-compose/docker-compose.yml config
#   docker compose -f docker-compose/docker-compose.yml --profile core up -d
#
# File structure:
#   base.yml            - Shared configurations (anchors, volumes, networks, secrets)
#   core.yml            - Core infrastructure (base, db, redis, kafka, api, frontend)
#   engine.yml          - Engine services (engine, workers, kafka-consumer)
#   observability.yml   - Monitoring stack (loki, prometheus, tempo, grafana, etc.)
#   support.yml         - Zammad support stack
#   metadata.yml        - OpenMetadata stack
#   auth.yml            - Authentication (Keycloak)
#   gateway.yml         - API Gateway (Kong) + Edge
#   llm.yml             - LLM services
#   seed.yml            - Initialization/seed services
#   trino.yml           - Trino
#   airflow.yml         - Airflow

include:
  - ./base.yml
  - ./core.yml
  - ./engine.yml
  - ./observability.yml
  - ./support.yml
  - ./metadata.yml
  - ./auth.yml
  - ./gateway.yml
  - ./llm.yml
  - ./seed.yml
  - ./trino.yml
  - ./airflow.yml
