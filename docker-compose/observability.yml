services:
  dq-made-easy-db-postgres-exporter:
    depends_on:
      db:
        condition: service_healthy
      trust-bundle:
        condition: service_completed_successfully
    profiles:
    - observability
    image: quay.io/prometheuscommunity/postgres-exporter:v0.19.1
    container_name: dq-made-easy-db-postgres-exporter
    environment:
      DATA_SOURCE_NAME: postgresql://postgres:postgres@db:5432/dq?sslmode=verify-full&sslrootcert=/etc/postgres-exporter/internal-ca-bundle.pem
      PG_EXPORTER_EXTEND_QUERY_PATH: /etc/postgres-exporter/queries.yaml
    volumes:
    - ../observability/postgres-exporter/queries.yaml:/etc/postgres-exporter/queries.yaml:ro
    - ../tmp/certs/trust/internal-ca-bundle.pem:/etc/postgres-exporter/internal-ca-bundle.pem:ro
    restart: unless-stopped
    networks:
    - dq-network
    labels:
    - monitoring=true
  redis-exporter:
    depends_on:
      redis:
        condition: service_healthy
      trust-bundle:
        condition: service_completed_successfully
    profiles:
    - observability
    image: oliver006/redis_exporter:v1.67.0
    environment:
      REDIS_ADDR: rediss://redis:6379?ssl_cert_reqs=required&ssl_ca_certs=/etc/internal-certs/internal-ca-bundle.pem&ssl_check_hostname=true
    volumes:
    - ../tmp/certs/trust/internal-ca-bundle.pem:/etc/internal-certs/internal-ca-bundle.pem:ro
    restart: unless-stopped
    networks:
    - dq-network
    labels:
    - monitoring=true
  kong-postgres-exporter:
    depends_on:
      kong-db:
        condition: service_healthy
      trust-bundle:
        condition: service_completed_successfully
    profiles:
    - observability
    image: quay.io/prometheuscommunity/postgres-exporter:v0.19.1
    container_name: dq-made-easy-kong-postgres-exporter
    environment:
      DATA_SOURCE_NAME: postgresql://kong:kongpass@kong-db:5432/kong?sslmode=verify-full&sslrootcert=/etc/postgres-exporter/internal-ca-bundle.pem
      PG_EXPORTER_EXTEND_QUERY_PATH: /etc/postgres-exporter/queries.yaml
    volumes:
    - ../observability/postgres-exporter/queries.yaml:/etc/postgres-exporter/queries.yaml:ro
    - ../tmp/certs/mkcert-rootCA.pem:/etc/postgres-exporter/internal-ca-bundle.pem:ro
    restart: unless-stopped
    networks:
    - dq-network
    labels:
    - monitoring=true
  loki:
    depends_on:
      trust-bundle:
        condition: service_completed_successfully
    profiles:
    - observability
    image: grafana/loki:3.6.4
    container_name: dq-made-easy-loki
    ports:
    - ${LOKI_HOST_BIND:-0.0.0.0}:${LOKI_HOST_PORT:-3100}:3100
    environment:
      LOKI_CONFIG_FILE: /etc/loki/local-config.yml
    volumes:
    - ../observability/loki/loki-config.yml:/etc/loki/local-config.yml
    - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yml
    restart: unless-stopped
    healthcheck:
      test:
      - CMD
      - wget
      - --no-verbose
      - --tries=1
      - --spider
      - http://loki:3100/ready
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
    - dq-network
    labels:
    - monitoring=true
  prometheus:
    profiles:
    - observability
    image: prom/prometheus:v3
    container_name: dq-made-easy-prometheus
    user: 0:0
    ports:
    - ${PROMETHEUS_HOST_BIND:-0.0.0.0}:${PROMETHEUS_HOST_PORT:-9090}:9090
    environment:
    - TZ=UTC
    - SSO_INTERNAL_ISSUER_URL=${SSO_INTERNAL_ISSUER_URL?SSO_INTERNAL_ISSUER_URL is
      required}
    - DQ_ENGINE_OIDC_CLIENT_ID=${DQ_ENGINE_OIDC_CLIENT_ID?DQ_ENGINE_OIDC_CLIENT_ID
      is required}
    volumes:
    - ../observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    - ../observability/prometheus/alerts.yml:/etc/prometheus/alerts.yml
    - ../observability/prometheus/tmp/prometheus_oauth2_client_secret.txt:/etc/prometheus/oauth2_client_secret:ro
    - ../tmp/certs/mkcert-rootCA.pem:/etc/prometheus/certs/mkcert-rootCA.pem:ro
    - prometheus_data:/prometheus
    command:
    - --config.file=/etc/prometheus/prometheus.yml
    - --storage.tsdb.path=/prometheus
    - --storage.tsdb.retention.time=90d
    - --web.console.libraries=/usr/share/prometheus/console_libraries
    - --web.console.templates=/usr/share/prometheus/consoles
    - --web.enable-lifecycle
    restart: unless-stopped
    healthcheck:
      test:
      - CMD
      - wget
      - --no-verbose
      - --tries=1
      - --spider
      - http://prometheus:9090/-/healthy
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
    - dq-network
    depends_on:
      loki:
        condition: service_completed_successfully
      trust-bundle:
        condition: service_completed_successfully
    labels:
    - monitoring=true
  tempo:
    profiles:
    - observability
    image: grafana/tempo:2.6.1
    container_name: dq-made-easy-tempo
    user: 0:0
    ports:
    - ${TEMPO_HOST_BIND:-0.0.0.0}:${TEMPO_HOST_PORT:-3200}:3200
    environment:
    - TZ=UTC
    volumes:
    - ../observability/tempo/tempo-config.yml:/etc/tempo/tempo.yml
    - tempo_data:/var/tempo
    command:
    - -config.file=/etc/tempo/tempo.yml
    restart: unless-stopped
    healthcheck:
      test:
      - CMD
      - wget
      - --no-verbose
      - --tries=1
      - --spider
      - http://tempo:3200/ready
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
    - dq-network
    depends_on:
      prometheus:
        condition: service_completed_successfully
      trust-bundle:
        condition: service_completed_successfully
    labels:
    - monitoring=true
  grafana:
    profiles:
    - observability
    image: grafana/grafana:12.3
    container_name: dq-made-easy-grafana
    ports:
    - ${GRAFANA_HOST_BIND:-0.0.0.0}:${GRAFANA_HTTPS_HOST_PORT:-3000}:3000
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme}
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_AUTH_BASIC_ENABLED: ${GRAFANA_AUTH_BASIC_ENABLED:-true}
      GF_AUTH_DISABLE_LOGIN_FORM: ${GRAFANA_AUTH_DISABLE_LOGIN_FORM:-false}
      GF_USERS_ALLOW_SIGN_UP: 'true'
      GF_AUTH_GENERIC_OAUTH_ENABLED: 'true'
      GF_AUTH_GENERIC_OAUTH_NAME: Keycloak
      GF_AUTH_GENERIC_OAUTH_CLIENT_ID: grafana
      GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET: ${GRAFANA_OIDC_SECRET:-changeme}
      GRAFANA_OIDC_SECRET: ${GRAFANA_OIDC_SECRET:-changeme}
      GF_AUTH_GENERIC_OAUTH_SCOPES: openid profile email roles
      GF_AUTH_GENERIC_OAUTH_AUTH_URL: ${KEYCLOAK_PUBLIC_URL:-}/realms/${KEYCLOAK_REALM:?KEYCLOAK_REALM
        is required}/protocol/openid-connect/auth
      GF_AUTH_GENERIC_OAUTH_TOKEN_URL: ${SSO_INTERNAL_ISSUER_URL:?SSO_INTERNAL_ISSUER_URL
        is required}/protocol/openid-connect/token
      GF_AUTH_GENERIC_OAUTH_LOGIN_ATTRIBUTE_PATH: email
      GF_AUTH_GENERIC_OAUTH_EMAIL_ATTRIBUTE_PATH: email
      GF_AUTH_GENERIC_OAUTH_NAME_ATTRIBUTE_PATH: email
      GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH: contains(email, 'dq-admin@jaccloud.nl')
        && 'Admin' || 'Viewer'
      GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_STRICT: 'true'
      GF_AUTH_GENERIC_OAUTH_ALLOW_SIGN_UP: 'true'
      GF_AUTH_GENERIC_OAUTH_SKIP_ORG_ROLE_SYNC: 'true'
      GF_AUTH_GENERIC_OAUTH_ALLOW_ASSIGN_GRAFANA_ADMIN: 'true'
      GF_AUTH_GENERIC_OAUTH_AUTO_LOGIN: ${GRAFANA_AUTH_GENERIC_OAUTH_AUTO_LOGIN:-false}
      GF_SERVER_DOMAIN: ${GRAFANA_PUBLIC_DOMAIN?GRAFANA_PUBLIC_DOMAIN is required}
      GF_SERVER_HTTP_ADDR: 0.0.0.0
      GF_SERVER_HTTP_PORT: '3000'
      GF_SERVER_PROTOCOL: https
      GF_SERVER_CERT_FILE: /etc/grafana/certs/${GRAFANA_CERT_FILE:?GRAFANA_CERT_FILE is required}
      GF_SERVER_CERT_KEY: /etc/grafana/certs/${GRAFANA_KEY_FILE:?GRAFANA_KEY_FILE is required}
      GF_SERVER_ROOT_URL: ${GRAFANA_PUBLIC_URL?GRAFANA_PUBLIC_URL is required}
      GF_SERVER_SERVE_FROM_SUB_PATH: ${GRAFANA_SERVE_FROM_SUB_PATH?GRAFANA_SERVE_FROM_SUB_PATH
        is required}
      GF_RBAC_PERMISSION_CACHE_TTL: '3600'
      GF_ANALYTICS_REPORTING_ENABLED: 'false'
      GF_ANALYTICS_CHECK_FOR_UPDATES: 'false'
      GF_ANALYTICS_CHECK_FOR_PLUGIN_UPDATES: 'false'
      GF_NEWS_NEWS_FEED_ENABLED: 'false'
      GF_PLUGINS_PUBLIC_KEY_RETRIEVAL_DISABLED: 'true'
      GF_PLUGINS_PLUGIN_ADMIN_ENABLED: 'false'
      GF_INSTALL_PLUGINS: yesoreyeram-infinity-datasource
      SSL_CERT_FILE: /run/secrets/internal_corporate_root_ca
      TZ: UTC
    secrets:
    - internal_corporate_root_ca
    volumes:
    - ../tmp/certs/${GRAFANA_CERT_FILE:-grafana.pem}:/etc/grafana/certs/grafana.pem:ro
    - ../tmp/certs/${GRAFANA_KEY_FILE:-grafana-key.pem}:/etc/grafana/certs/grafana-key.pem:ro
    - ../tmp/certs/mkcert-rootCA.pem:/etc/grafana/certs/mkcert-rootCA.pem:ro
    - ../observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
    - ../observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
    - ../observability/grafana/grafana.ini:/etc/grafana/grafana.ini
    - grafana_data:/var/lib/grafana
    restart: unless-stopped
    healthcheck:
      test:
      - CMD-SHELL
      - curl --fail --silent --show-error --cacert /etc/grafana/certs/mkcert-rootCA.pem
        https://127.0.0.1:3000/api/health >/dev/null
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s
    networks:
    - dq-network
    depends_on:
      loki:
        condition: service_completed_successfully
      prometheus:
        condition: service_completed_successfully
      tempo:
        condition: service_completed_successfully
      trust-bundle:
        condition: service_completed_successfully
    labels:
    - monitoring=true
  container-metrics:
    depends_on:
      trust-bundle:
        condition: service_completed_successfully
    profiles:
    - observability
    build:
      context: ../observability/container-metrics
      dockerfile: Dockerfile.container-metrics
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
      secrets:
      - internal_corporate_root_ca
    container_name: dq-made-easy-container-metrics
    environment:
      COMPOSE_PROJECT: ${COMPOSE_PROJECT_NAME?COMPOSE_PROJECT_NAME is required}
      LOG_LEVEL: INFO
      PORT: 8000
      NEXUSCLOUD_USERNAME: ${NEXUSCLOUD_USERNAME:-}
      NEXUSCLOUD_PASSWORD: ${NEXUSCLOUD_PASSWORD:-}
      NEXUSCLOUD_DNS: ${NEXUSCLOUD_DNS:-}
      NEXUSCLOUD_PYPI_GROUP_REPO: ${NEXUSCLOUD_PYPI_GROUP_REPO:-}
    ports:
    - ${CONTAINER_METRICS_HOST_BIND:-0.0.0.0}:${CONTAINER_METRICS_HOST_PORT:-8881}:8000
    volumes:
    - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    networks:
    - dq-network
    labels:
    - monitoring=true
  pushgateway:
    depends_on:
      trust-bundle:
        condition: service_completed_successfully
    profiles:
    - observability
    - pushgateway
    image: prom/pushgateway:v1.11.2
    container_name: dq-made-easy-pushgateway
    ports:
    - ${PUSHGATEWAY_HOST_BIND:-0.0.0.0}:${PUSHGATEWAY_HOST_PORT:-9091}:9091
    restart: unless-stopped
    healthcheck:
      test:
      - CMD
      - wget
      - --no-verbose
      - --tries=1
      - --spider
      - http://pushgateway:9091/-/healthy
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
    - dq-network
    labels:
    - monitoring=true
  otel-collector:
    profiles:
    - observability
    - otel
    image: otel/opentelemetry-collector-contrib:0.148.0
    container_name: dq-made-easy-otel-collector
    command:
    - --config=/etc/otel-collector-config.yml
    ports:
    - ${OTEL_GRPC_HOST_BIND:-0.0.0.0}:${OTEL_GRPC_HOST_PORT:-4317}:4317
    - ${OTEL_HTTP_HOST_BIND:-0.0.0.0}:${OTEL_HTTP_HOST_PORT:-4318}:4318
    - ${OTEL_JAEGER_HOST_BIND:-0.0.0.0}:${OTEL_JAEGER_HOST_PORT:-14250}:14250
    - ${OTEL_ZIPKIN_HOST_BIND:-0.0.0.0}:${OTEL_ZIPKIN_HOST_PORT:-9411}:9411
    volumes:
    - ../observability/otel-collector/config.yml:/etc/otel-collector-config.yml
    - ../tmp/certs:/etc/otel/certs:ro
    - ../tmp:/var/tmp
    environment:
      TZ: UTC
    networks:
    - dq-network
    depends_on:
      tempo:
        condition: service_completed_successfully
      prometheus:
        condition: service_completed_successfully
      trust-bundle:
        condition: service_completed_successfully
  aistor:
    depends_on:
      trust-bundle:
        condition: service_completed_successfully
    profiles:
    - observability
    - aistor
    image: quay.io/minio/aistor/minio:latest
    container_name: dq-made-easy-aistor
    ports:
    - ${AISTOR_API_HOST_BIND:-0.0.0.0}:${AISTOR_API_HOST_PORT:-9222}:9000
    - ${AISTOR_CONSOLE_HOST_BIND:-0.0.0.0}:${AISTOR_CONSOLE_HOST_PORT:-9001}:9001
    environment:
      MINIO_ROOT_USER: ${AISTOR_ROOT_USER?AISTOR_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${AISTOR_ROOT_PASSWORD?AISTOR_ROOT_PASSWORD is required}
      MINIO_PROMETHEUS_AUTH_TYPE: public
    volumes:
    - aistor_data:/mnt/data
    - ${AISTOR_LICENSE_FILE:?AISTOR_LICENSE_FILE is required}:/minio.license:ro
    - ../tmp/certs/services/aistor:/root/.minio/certs:ro
    command:
    - minio
    - server
    - /mnt/data
    - --certs-dir
    - /root/.minio/certs
    - --console-address
    - :9001
    - --license
    - /minio.license
    restart: unless-stopped
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - --cacert
      - /root/.minio/certs/CAs/internal-ca-bundle.pem
      - https://localhost:9000/minio/health/live
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      dq-network:
        aliases:
        - minio
    labels:
    - monitoring=false
  grafana-init:
    depends_on:
      grafana:
        condition: service_started
      trust-bundle:
        condition: service_completed_successfully
    profiles:
    - observability
    image: curlimages/curl:latest
    container_name: dq-made-easy-grafana-init
    entrypoint: sh -c
    command:
    - "echo \"Waiting for Grafana to be ready...\"\nuntil curl --fail --silent --show-error\
      \ --cacert /etc/grafana-init/mkcert-rootCA.pem https://grafana:3000/api/health\
      \ > /dev/null 2>&1; do\n  echo \"  Grafana not ready yet, waiting...\"\n  sleep\
      \ 2\ndone\n\necho \"Grafana is ready!\"\necho \"Setting up teams and dashboard\
      \ permissions...\"\necho \"\"\n\n# Create Viewers team\nVIEWER_RESPONSE=$$(curl\
      \ -s -X POST \\\n  -u admin:changeme \\\n  -H \"Content-Type: application/json\"\
      \ \\\n  https://grafana:3000/api/teams \\\n  -d '{\"name\": \"Viewers\", \"\
      email\": \"viewers@dq-rulebuilder.local\"}')\nVIEWER_ID=$$(echo $$VIEWER_RESPONSE\
      \ | grep -o '\"id\":[0-9]*' | head -1 | grep -o '[0-9]*' || echo \"\")\nif [\
      \ -z \"$$VIEWER_ID\" ]; then\n  VIEWER_ID=$$(curl -s -X GET \\\n    -u admin:changeme\
      \ \\\n    'https://grafana:3000/api/teams/search?query=Viewers' | grep -o '\"\
      id\":[0-9]*' | head -1 | grep -o '[0-9]*')\nfi\necho \"\u2713 Viewers team ID:\
      \ $$VIEWER_ID\"\n\n# Create Editors team\nEDITOR_RESPONSE=$$(curl -s -X POST\
      \ \\\n  -u admin:changeme \\\n  -H \"Content-Type: application/json\" \\\n \
      \ https://grafana:3000/api/teams \\\n  -d '{\"name\": \"Editors\", \"email\"\
      : \"editors@dq-rulebuilder.local\"}')\nEDITOR_ID=$$(echo $$EDITOR_RESPONSE |\
      \ grep -o '\"id\":[0-9]*' | head -1 | grep -o '[0-9]*' || echo \"\")\nif [ -z\
      \ \"$$EDITOR_ID\" ]; then\n  EDITOR_ID=$$(curl -s -X GET \\\n    -u admin:changeme\
      \ \\\n    'https://grafana:3000/api/teams/search?query=Editors' | grep -o '\"\
      id\":[0-9]*' | head -1 | grep -o '[0-9]*')\nfi\necho \"\u2713 Editors team ID:\
      \ $$EDITOR_ID\"\n\n# Create Admins team\nADMIN_RESPONSE=$$(curl -s -X POST \\\
      \n  -u admin:changeme \\\n  -H \"Content-Type: application/json\" \\\n  https://grafana:3000/api/teams\
      \ \\\n  -d '{\"name\": \"Admins\", \"email\": \"admins@dq-rulebuilder.local\"\
      }')\nADMIN_ID=$$(echo $$ADMIN_RESPONSE | grep -o '\"id\":[0-9]*' | head -1 |\
      \ grep -o '[0-9]*' || echo \"\")\nif [ -z \"$$ADMIN_ID\" ]; then\n  ADMIN_ID=$$(curl\
      \ -s -X GET \\\n    -u admin:changeme \\\n    'https://grafana:3000/api/teams/search?query=Admins'\
      \ | grep -o '\"id\":[0-9]*' | head -1 | grep -o '[0-9]*')\nfi\necho \"\u2713\
      \ Admins team ID: $$ADMIN_ID\"\n\n echo \"\"\n echo \"Setting dashboard permissions...\"\
      \n\nDASHBOARD_ID=$$(curl -s -X GET \\\n  -u admin:changeme \\\n  \"https://grafana:3000/api/search?type=dash-db&query=$$OBSERVABILITY_DASHBOARD_UID\"\
      \ \\\n  | sed -n 's/.*\"id\":\\([0-9][0-9]*\\).*/\\1/p' | head -1)\n\n if [\
      \ -z \"$$DASHBOARD_ID\" ]; then\n   echo \"\u26A0 Dashboard '$$OBSERVABILITY_DASHBOARD_TITLE'\
      \ (uid=$$OBSERVABILITY_DASHBOARD_UID) not found. Skipping permissions setup.\"\
      \n   echo \"  You can set permissions manually after the dashboard is available.\"\
      \n else\n   echo \"\u2713 Found dashboard ID: $$DASHBOARD_ID\"\n \n  curl -s\
      \ -X POST \\\n    -u admin:changeme \\\n    -H \"Content-Type: application/json\"\
      \ \\\n    https://grafana:3000/api/dashboards/id/$$DASHBOARD_ID/permissions\
      \ \\\n    -d \"{\\\"items\\\":[{\\\"teamId\\\": $$VIEWER_ID, \\\"permission\\\
      \": 1},{\\\"teamId\\\": $$EDITOR_ID, \\\"permission\\\": 2},{\\\"teamId\\\"\
      : $$ADMIN_ID, \\\"permission\\\": 4}]}\" > /dev/null 2>&1\n  echo \"\u2713 Viewers:\
      \ Read-only access (permission: 1)\"\n  echo \"\u2713 Editors: Edit access (permission:\
      \ 2)\"\n  echo \"\u2713 Admins: Admin access (permission: 4)\"\n fi\n\n echo\
      \ \"\"\n echo \"\u2705 Grafana provisioning complete!\"\n echo \"   Teams: Viewers,\
      \ Editors, Admins\"\n echo \"   Ready for OIDC + permission enforcement\"\n"
    environment:
      TZ: UTC
      OBSERVABILITY_DASHBOARD_UID: ${OBSERVABILITY_DASHBOARD_UID:-dq-execution-monitoring}
      OBSERVABILITY_DASHBOARD_TITLE: ${OBSERVABILITY_DASHBOARD_TITLE:-Data Quality
        Made Easy - Execution Monitoring}
      CURL_CA_BUNDLE: /etc/grafana-init/mkcert-rootCA.pem
      SSL_CERT_FILE: /etc/grafana-init/mkcert-rootCA.pem
    volumes:
    - ../tmp/certs/mkcert-rootCA.pem:/etc/grafana-init/mkcert-rootCA.pem:ro
    networks:
    - dq-network
    restart: 'no'
    labels:
    - monitoring=false
