x-zammad-service:
  profiles: &id001
  - support
  image: ${ZAMMAD_IMAGE:?ZAMMAD_IMAGE is required}
  restart: unless-stopped
  environment: &id002
    MEMCACHE_SERVERS: ${ZAMMAD_MEMCACHE_SERVERS:?ZAMMAD_MEMCACHE_SERVERS is required}
    POSTGRESQL_DB: ${ZAMMAD_POSTGRES_DB:?ZAMMAD_POSTGRES_DB is required}
    POSTGRESQL_HOST: ${ZAMMAD_POSTGRES_HOST:?ZAMMAD_POSTGRES_HOST is required}
    POSTGRESQL_USER: ${ZAMMAD_POSTGRES_USER:?ZAMMAD_POSTGRES_USER is required}
    POSTGRESQL_PASS: ${ZAMMAD_POSTGRES_PASSWORD:?ZAMMAD_POSTGRES_PASSWORD is required}
    POSTGRESQL_PORT: ${ZAMMAD_POSTGRES_PORT:?ZAMMAD_POSTGRES_PORT is required}
    POSTGRESQL_OPTIONS: ${ZAMMAD_POSTGRESQL_OPTIONS:?ZAMMAD_POSTGRESQL_OPTIONS is required}
    REDIS_URL: ${ZAMMAD_REDIS_URL:?ZAMMAD_REDIS_URL is required}
    ELASTICSEARCH_ENABLED: ${ZAMMAD_ELASTICSEARCH_ENABLED:?ZAMMAD_ELASTICSEARCH_ENABLED is required}
    ELASTICSEARCH_HOST: ${ZAMMAD_ELASTICSEARCH_HOST:?ZAMMAD_ELASTICSEARCH_HOST is required}
    ELASTICSEARCH_PORT: ${ZAMMAD_ELASTICSEARCH_PORT:?ZAMMAD_ELASTICSEARCH_PORT is required}
    ELASTICSEARCH_SCHEMA: ${ZAMMAD_ELASTICSEARCH_SCHEMA:?ZAMMAD_ELASTICSEARCH_SCHEMA is required}
    ELASTICSEARCH_NAMESPACE: ${ZAMMAD_ELASTICSEARCH_NAMESPACE:?ZAMMAD_ELASTICSEARCH_NAMESPACE is required}
    ELASTICSEARCH_SSL_VERIFY: ${ZAMMAD_ELASTICSEARCH_SSL_VERIFY:?ZAMMAD_ELASTICSEARCH_SSL_VERIFY is required}
    AUTOWIZARD_JSON: ${AUTOWIZARD_JSON:-}
    AUTOWIZARD_RELATIVE_PATH: ${AUTOWIZARD_RELATIVE_PATH:?AUTOWIZARD_RELATIVE_PATH is required}
    NGINX_PORT: ${ZAMMAD_NGINX_PORT:?ZAMMAD_NGINX_PORT is required}
    NGINX_SERVER_NAME: ${ZAMMAD_NGINX_SERVER_NAME:?ZAMMAD_NGINX_SERVER_NAME is required}
    NGINX_SERVER_SCHEME: ${ZAMMAD_NGINX_SERVER_SCHEME:?ZAMMAD_NGINX_SERVER_SCHEME is required}
    RAILS_TRUSTED_PROXIES: ${ZAMMAD_RAILS_TRUSTED_PROXIES:?ZAMMAD_RAILS_TRUSTED_PROXIES is required}
    ZAMMAD_HTTP_TYPE: ${ZAMMAD_HTTP_TYPE:?ZAMMAD_HTTP_TYPE is required}
    ZAMMAD_FQDN: ${ZAMMAD_FQDN:?ZAMMAD_FQDN is required}
    ZAMMAD_PUBLIC_URL: ${ZAMMAD_PUBLIC_URL:?ZAMMAD_PUBLIC_URL is required}
    ZAMMAD_WEB_CONCURRENCY: ${ZAMMAD_WEB_CONCURRENCY:?ZAMMAD_WEB_CONCURRENCY is required}
    KEYCLOAK_SERVER_SIDE_URL: ${KEYCLOAK_SERVER_SIDE_URL:?KEYCLOAK_SERVER_SIDE_URL is required}
    SSO_PUBLIC_ISSUER_URL: ${SSO_PUBLIC_ISSUER_URL:?SSO_PUBLIC_ISSUER_URL is required}
    SSL_CERT_FILE: /etc/zammad/certs/mkcert-rootCA.pem
    CURL_CA_BUNDLE: /etc/zammad/certs/mkcert-rootCA.pem
    TZ: ${TZ:?TZ is required}
  volumes: &id003
  - zammad_backup:/var/tmp/zammad:ro
  - zammad_storage:/opt/zammad/storage
  - ../tmp/certs/mkcert-rootCA.pem:/usr/lib/ssl/cert.pem:ro
  - ../tmp/certs/mkcert-rootCA.pem:/etc/zammad/certs/mkcert-rootCA.pem:ro
  - ../docker/zammad/init.sh:/opt/zammad/init.sh:ro
  - ../docker/zammad/initializers/99-openid-connect-server-side-url.rb:/opt/zammad/config/initializers/99-openid-connect-server-side-url.rb:ro
  networks: &id004
  - dq-network
services:
  zammad-postgresql:
    depends_on:
      trust-bundle:
        condition: service_completed_successfully
    profiles:
    - support
    image: postgres:${ZAMMAD_POSTGRES_VERSION:?ZAMMAD_POSTGRES_VERSION is required}
    command:
    - postgres
    - -c
    - ssl=on
    - -c
    - ssl_cert_file=/etc/postgresql/certs/tls.crt
    - -c
    - ssl_key_file=/etc/postgresql/certs/tls.key
    environment:
      POSTGRES_DB: ${ZAMMAD_POSTGRES_DB:?ZAMMAD_POSTGRES_DB is required}
      POSTGRES_USER: ${ZAMMAD_POSTGRES_USER:?ZAMMAD_POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${ZAMMAD_POSTGRES_PASSWORD:?ZAMMAD_POSTGRES_PASSWORD is required}
    volumes:
    - ../tmp/certs/services/zammad-db:/etc/postgresql/certs:ro
    - zammad_postgresql_data:/var/lib/postgresql/data
    restart: unless-stopped
    labels:
    - monitoring=true
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U ${ZAMMAD_POSTGRES_USER:?ZAMMAD_POSTGRES_USER is required} -d ${ZAMMAD_POSTGRES_DB:?ZAMMAD_POSTGRES_DB is required} -h localhost
        || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
    - dq-network
  zammad-redis:
    depends_on:
      trust-bundle:
        condition: service_completed_successfully
    profiles:
    - support
    image: redis:${ZAMMAD_REDIS_VERSION:?ZAMMAD_REDIS_VERSION is required}
    command: redis-server --appendonly yes
    volumes:
    - zammad_redis_data:/data
    restart: unless-stopped
    labels:
    - monitoring=true
    healthcheck:
      test:
      - CMD
      - redis-cli
      - ping
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
    - dq-network
  zammad-memcached:
    depends_on:
      trust-bundle:
        condition: service_completed_successfully
    profiles:
    - support
    image: memcached:${ZAMMAD_MEMCACHE_VERSION:?ZAMMAD_MEMCACHE_VERSION is required}
    command: memcached -m 256M
    restart: unless-stopped
    labels:
    - monitoring=true
    networks:
    - dq-network
  zammad-init:
    profiles: *id001
    image: ${ZAMMAD_IMAGE:?ZAMMAD_IMAGE is required}
    restart: "no"
    environment: *id002
    volumes: *id003
    networks: *id004
    depends_on:
      zammad-postgresql:
        condition: service_healthy
      zammad-redis:
        condition: service_healthy
      zammad-memcached:
        condition: service_started
      trust-bundle:
        condition: service_completed_successfully
    command:
    - sh
    - /opt/zammad/init.sh
    - zammad-init
    user: 0:0
    labels:
    - monitoring=true
  zammad-railsserver:
    profiles: *id001
    image: ${ZAMMAD_IMAGE:?ZAMMAD_IMAGE is required}
    restart: unless-stopped
    environment: *id002
    volumes:
    - ../tmp/certs/services/zammad-railsserver:/etc/zammad/certs:ro
    - ../docker/zammad/init.sh:/opt/zammad/init.sh:ro
    networks: *id004
    depends_on:
      zammad-init:
        condition: service_completed_successfully
      zammad-postgresql:
        condition: service_healthy
      zammad-redis:
        condition: service_healthy
      zammad-memcached:
        condition: service_started
      trust-bundle:
        condition: service_completed_successfully
    command:
    - sh
    - /opt/zammad/init.sh
    - zammad-railsserver
    healthcheck:
      test:
      - CMD-SHELL
      - curl -fsS http://127.0.0.1:3000/
        >/dev/null 2>&1 || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
    - monitoring=true
  zammad-scheduler:
    profiles: *id001
    image: ${ZAMMAD_IMAGE:?ZAMMAD_IMAGE is required}
    restart: unless-stopped
    environment: *id002
    volumes: *id003
    networks: *id004
    depends_on:
      zammad-init:
        condition: service_completed_successfully
      zammad-postgresql:
        condition: service_healthy
      zammad-redis:
        condition: service_healthy
      zammad-memcached:
        condition: service_started
      trust-bundle:
        condition: service_completed_successfully
    command:
    - sh
    - /opt/zammad/init.sh
    - zammad-scheduler
    labels:
    - monitoring=true
  zammad-websocket:
    profiles: *id001
    image: ${ZAMMAD_IMAGE:?ZAMMAD_IMAGE is required}
    restart: unless-stopped
    environment: *id002
    volumes:
    - ../tmp/certs/services/zammad-websocket:/etc/zammad/certs:ro
    - ../docker/zammad/init.sh:/opt/zammad/init.sh:ro
    networks: *id004
    depends_on:
      zammad-init:
        condition: service_completed_successfully
      zammad-postgresql:
        condition: service_healthy
      zammad-redis:
        condition: service_healthy
      zammad-memcached:
        condition: service_started
      trust-bundle:
        condition: service_completed_successfully
    command:
    - sh
    - /opt/zammad/init.sh
    - zammad-websocket
    healthcheck:
      test:
      - CMD-SHELL
      - 'echo | openssl s_client -connect 127.0.0.1:6042 -CAfile /etc/zammad/certs/mkcert-rootCA.pem
        2>/dev/null | grep -q ''Verify return code: 0'' && exit 0 || exit 1'
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
    - monitoring=true
  zammad-nginx:
    profiles: *id001
    image: ${ZAMMAD_IMAGE:?ZAMMAD_IMAGE is required}
    restart: unless-stopped
    environment: *id002
    volumes: *id003
    networks: *id004
    depends_on:
      zammad-init:
        condition: service_completed_successfully
      zammad-railsserver:
        condition: service_started
      zammad-scheduler:
        condition: service_started
      zammad-websocket:
        condition: service_started
      trust-bundle:
        condition: service_completed_successfully
    command:
    - zammad-nginx
    labels:
    - monitoring=true
  zammad-https:
    depends_on:
      zammad-railsserver:
        condition: service_started
      zammad-websocket:
        condition: service_started
      trust-bundle:
        condition: service_completed_successfully
    profiles:
    - support
    build:
      context: ..
      dockerfile: docker/Dockerfile.zammad-origin
      args:
        ZAMMAD_IMAGE: ${ZAMMAD_IMAGE:?ZAMMAD_IMAGE is required}
    restart: unless-stopped
    environment:
      <<: *id002
      ZAMMAD_SSL_CERT_FILE_NAME: ${ZAMMAD_SSL_CERT_FILE_NAME:?ZAMMAD_SSL_CERT_FILE_NAME is required}
      ZAMMAD_SSL_KEY_FILE_NAME: ${ZAMMAD_SSL_KEY_FILE_NAME:?ZAMMAD_SSL_KEY_FILE_NAME is required}
    volumes:
    - ${EDGE_SSL_CERTS_DIR:?EDGE_SSL_CERTS_DIR is required}:/etc/nginx/certs:ro
    - ../tmp/certs/mkcert-rootCA.pem:/etc/zammad/certs/mkcert-rootCA.pem:ro
    - ../tmp/certs/mkcert-rootCA.pem:/usr/lib/ssl/cert.pem:ro
    ports:
    - ${ZAMMAD_HOST_BIND:?ZAMMAD_HOST_BIND is required}:${ZAMMAD_EXPOSE_PORT:?ZAMMAD_EXPOSE_PORT is required}:443
    networks:
    - dq-network
    labels:
    - monitoring=true
  zammad-seed:
    depends_on:
      keycloak:
        condition: service_healthy
      zammad-postgresql:
        condition: service_healthy
      zammad-redis:
        condition: service_healthy
      zammad-memcached:
        condition: service_started
      zammad-railsserver:
        condition: service_started
      trust-bundle:
        condition: service_completed_successfully
    profiles:
    - support
    build:
      context: ..
      dockerfile: docker/Dockerfile.zammad.seed
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
      secrets:
      - internal_corporate_root_ca
    env_file:
    - ../${ROOT_ENV_FILE:?ROOT_ENV_FILE is required}
    environment:
      DQ_DB_INTERNAL_URL: ${DQ_DB_INTERNAL_URL?DQ_DB_INTERNAL_URL is required}
      APP_CONFIG_ENCRYPTION_KEY: ${APP_CONFIG_ENCRYPTION_KEY?APP_CONFIG_ENCRYPTION_KEY
        is required}
      KEYCLOAK_INTERNAL_URL: ${KEYCLOAK_INTERNAL_URL?KEYCLOAK_INTERNAL_URL is required}
      KEYCLOAK_ADMIN_REALM: ${KEYCLOAK_ADMIN_REALM?KEYCLOAK_ADMIN_REALM is required}
      KEYCLOAK_ADMIN_USER: ${KEYCLOAK_ADMIN_USER?KEYCLOAK_ADMIN_USER is required}
      KEYCLOAK_ADMIN_PASS: ${KEYCLOAK_ADMIN_PASS?KEYCLOAK_ADMIN_PASS is required}
      KEYCLOAK_SYSTEM_ADMIN_USERNAME: ${KEYCLOAK_SYSTEM_ADMIN_USERNAME?KEYCLOAK_SYSTEM_ADMIN_USERNAME
        is required}
      KEYCLOAK_SYSTEM_ADMIN_PASSWORD: ${KEYCLOAK_SYSTEM_ADMIN_PASSWORD?KEYCLOAK_SYSTEM_ADMIN_PASSWORD
        is required}
      KEYCLOAK_SERVER_SIDE_URL: ${KEYCLOAK_SERVER_SIDE_URL:?KEYCLOAK_SERVER_SIDE_URL is required}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM?KEYCLOAK_REALM is required}
      ZAMMAD_SUPPORT_TOKEN_NAME: ${ZAMMAD_SUPPORT_TOKEN_NAME:?ZAMMAD_SUPPORT_TOKEN_NAME is required}
      ZAMMAD_SUPPORT_TOKEN_PERMISSION: ${ZAMMAD_SUPPORT_TOKEN_PERMISSION:?ZAMMAD_SUPPORT_TOKEN_PERMISSION is required}
      CURL_CA_BUNDLE: /workspace-tmp/certs/mkcert-rootCA.pem
      SSL_CERT_FILE: /workspace-tmp/certs/mkcert-rootCA.pem
    volumes:
    - /var/run/docker.sock:/var/run/docker.sock
    - ../tmp/certs/mkcert-rootCA.pem:/workspace-tmp/certs/mkcert-rootCA.pem:ro
    networks:
    - dq-network
    restart: 'no'
  openmetadata-search:
    depends_on:
      trust-bundle:
        condition: service_completed_successfully
    profiles:
    - support
    image: ${DOCKER_DOMAIN:?DOCKER_DOMAIN is required}/library/elasticsearch:8.11.4
    environment:
      discovery.type: single-node
      ELASTIC_PASSWORD: ${OPENMETADATA_SEARCH_PASSWORD:?OPENMETADATA_SEARCH_PASSWORD is required}
      xpack.security.enabled: 'true'
      xpack.security.http.ssl.enabled: 'true'
      xpack.security.http.ssl.key: /usr/share/elasticsearch/config/certs/tls.key
      xpack.security.http.ssl.certificate: /usr/share/elasticsearch/config/certs/tls.crt
      xpack.security.http.ssl.certificate_authorities: /usr/share/elasticsearch/config/certs/mkcert-rootCA.pem
      xpack.security.transport.ssl.enabled: 'true'
      xpack.security.transport.ssl.verification_mode: certificate
      xpack.security.transport.ssl.key: /usr/share/elasticsearch/config/certs/tls.key
      xpack.security.transport.ssl.certificate: /usr/share/elasticsearch/config/certs/tls.crt
      xpack.security.transport.ssl.certificate_authorities: /usr/share/elasticsearch/config/certs/mkcert-rootCA.pem
      ES_JAVA_OPTS: -Xms1g -Xmx1g
    ports:
    - ${OPENMETADATA_SEARCH_HOST_BIND:?OPENMETADATA_SEARCH_HOST_BIND is required}:${OPENMETADATA_SEARCH_HOST_PORT:?OPENMETADATA_SEARCH_HOST_PORT is required}:9200
    volumes:
    - ../tmp/certs/services/openmetadata-search/tls.crt:/usr/share/elasticsearch/config/certs/tls.crt:ro
    - ../tmp/certs/services/openmetadata-search/tls.key:/usr/share/elasticsearch/config/certs/tls.key:ro
    - ../tmp/certs/mkcert-rootCA.pem:/usr/share/elasticsearch/config/certs/mkcert-rootCA.pem:ro
    - openmetadata_search_data:/usr/share/elasticsearch/data
    restart: unless-stopped
    healthcheck:
      test:
      - CMD-SHELL
      - curl -fsS --cacert /usr/share/elasticsearch/config/certs/mkcert-rootCA.pem
        -u elastic:$$ELASTIC_PASSWORD https://127.0.0.1:9200/_cluster/health || exit
        1
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 40s
    networks:
    - dq-network
