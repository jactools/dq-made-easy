parameters:
  - name: artifactName
    type: string
    default: deploy-evidence
  - name: evidencePath
    type: string
    default: tmp/release/deploy-evidence
  - name: platform
    type: string
  - name: environmentName
    type: string
  - name: serviceName
    type: string
  - name: imageRef
    type: string
  - name: rolloutResult
    type: string
    default: unknown
  - name: ingressFqdn
    type: string
    default: ''
  - name: revisionName
    type: string
    default: ''
  - name: validationResult
    type: string
    default: unknown

steps:
  - bash: |
      set -euo pipefail

      evidence_path='${{ parameters.evidencePath }}'
      platform='${{ parameters.platform }}'
      environment_name='${{ parameters.environmentName }}'
      service_name='${{ parameters.serviceName }}'
      image_ref='${{ parameters.imageRef }}'
      rollout_result='${{ parameters.rolloutResult }}'
      ingress_fqdn='${{ parameters.ingressFqdn }}'
      revision_name='${{ parameters.revisionName }}'
      validation_result='${{ parameters.validationResult }}'
      timestamp="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

      mkdir -p "$evidence_path"

      cat > "$evidence_path/deploy-evidence.json" <<JSON
      {
        "platform": "${platform}",
        "environment": "${environment_name}",
        "service": "${service_name}",
        "image": "${image_ref}",
        "rolloutResult": "${rollout_result}",
        "ingressFqdn": "${ingress_fqdn}",
        "revisionName": "${revision_name}",
        "validationResult": "${validation_result}",
        "timestampUtc": "${timestamp}"
      }
      JSON
    displayName: Generate deployment evidence JSON

  - task: PublishPipelineArtifact@1
    displayName: Publish deployment evidence artifact
    inputs:
      targetPath: ${{ parameters.evidencePath }}
      artifact: ${{ parameters.artifactName }}
      publishLocation: pipeline
