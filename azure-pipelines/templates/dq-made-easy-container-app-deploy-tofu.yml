parameters:
  - name: containerAppName
    type: string
  - name: containerImage
    type: string
  - name: targetPort
    type: number
  - name: ingress
    type: string
    default: internal
  - name: revisionSuffix
    type: string
    default: ''
  - name: containerName
    type: string
    default: app
  - name: registryServer
    type: string
    default: ''
  - name: registryUsername
    type: string
    default: ''
  - name: registryPassword
    type: string
    default: ''

jobs:
  - job: DeployContainerApp
    displayName: dq-made-easy - Deploy container app
    pool:
      vmImage: ubuntu-latest
    steps:
      - checkout: self

      - bash: |
          set -euo pipefail

          required_vars=(
            azureServiceConnection
            resourceGroupName
            region
            containerAppEnvironmentName
            logAnalyticsWorkspaceName
            stateResourceGroupName
            stateStorageAccountName
            stateStorageContainerName
            stateKeyPrefix
          )

          for var_name in "${required_vars[@]}"; do
            if [[ -z "${!var_name:-}" ]]; then
              echo "$var_name is required" >&2
              exit 1
            fi
          done

          if [[ -n "${registryServer:-}" && ( -z "${registryUsername:-}" || -z "${registryPassword:-}" ) ]]; then
            echo "registryUsername and registryPassword are required when registryServer is set" >&2
            exit 1
          fi
        displayName: dq-made-easy - Validate deploy inputs
        env:
          azureServiceConnection: $(azureServiceConnection)
          resourceGroupName: $(resourceGroupName)
          region: $(region)
          containerAppEnvironmentName: $(containerAppEnvironmentName)
          logAnalyticsWorkspaceName: $(logAnalyticsWorkspaceName)
          stateResourceGroupName: $(stateResourceGroupName)
          stateStorageAccountName: $(stateStorageAccountName)
          stateStorageContainerName: $(stateStorageContainerName)
          stateKeyPrefix: $(stateKeyPrefix)
          registryServer: ${{ parameters.registryServer }}
          registryUsername: ${{ parameters.registryUsername }}
          registryPassword: ${{ parameters.registryPassword }}

      - task: AzureCLI@2
        displayName: dq-made-easy - Deploy container app with OpenTofu
        inputs:
          azureSubscription: $(azureServiceConnection)
          scriptType: bash
          scriptLocation: inlineScript
          addSpnToEnvironment: true
          inlineScript: |
            set -euo pipefail

            container_app_name='${{ parameters.containerAppName }}'
            container_image='${{ parameters.containerImage }}'
            target_port='${{ parameters.targetPort }}'
            ingress='${{ parameters.ingress }}'
            revision_suffix='${{ parameters.revisionSuffix }}'
            container_name='${{ parameters.containerName }}'
            registry_server='${{ parameters.registryServer }}'
            registry_username='${{ parameters.registryUsername }}'
            registry_password='${{ parameters.registryPassword }}'
            resource_group='$(resourceGroupName)'
            region='$(region)'
            environment_name='$(containerAppEnvironmentName)'
            workspace_name='$(logAnalyticsWorkspaceName)'
            state_resource_group='$(stateResourceGroupName)'
            state_storage_account='$(stateStorageAccountName)'
            state_storage_container='$(stateStorageContainerName)'
            state_key='$(stateKeyPrefix)/${container_app_name}.tfstate'

            if [[ -z "$container_app_name" || -z "$container_image" || -z "$target_port" ]]; then
              echo "containerAppName, containerImage, and targetPort are required" >&2
              exit 1
            fi

            az config set extension.use_dynamic_install=yes_without_prompt >/dev/null
            az extension add --name containerapp --upgrade --only-show-errors >/dev/null
            az provider register --namespace Microsoft.App --wait >/dev/null
            az provider register --namespace Microsoft.OperationalInsights --wait >/dev/null
            az provider register --namespace Microsoft.Storage --wait >/dev/null

            if ! command -v tofu >/dev/null 2>&1; then
              tofu_version="1.9.0"
              install_dir="$AGENT_TEMPDIRECTORY/opentofu"
              mkdir -p "$install_dir"
              archive="$install_dir/tofu_${tofu_version}_linux_amd64.zip"
              curl -fsSL -o "$archive" "https://github.com/opentofu/opentofu/releases/download/v${tofu_version}/tofu_${tofu_version}_linux_amd64.zip"
              unzip -oq "$archive" -d "$install_dir"
              export PATH="$install_dir:$PATH"
            fi

            if ! az storage account show \
              --resource-group "$state_resource_group" \
              --name "$state_storage_account" \
              --output none >/dev/null 2>&1; then
              az group create \
                --name "$state_resource_group" \
                --location "$region" \
                --output none

              az storage account create \
                --resource-group "$state_resource_group" \
                --name "$state_storage_account" \
                --location "$region" \
                --sku Standard_LRS \
                --kind StorageV2 \
                --min-tls-version TLS1_2 \
                --allow-blob-public-access false \
                --output none
            fi

            if [[ "$(az storage container exists --account-name "$state_storage_account" --name "$state_storage_container" --auth-mode login --query exists -o tsv)" != "true" ]]; then
              az storage container create \
                --account-name "$state_storage_account" \
                --name "$state_storage_container" \
                --auth-mode login \
                --output none
            fi

            export ARM_CLIENT_ID="$servicePrincipalId"
            export ARM_CLIENT_SECRET="$servicePrincipalKey"
            export ARM_TENANT_ID="$tenantId"
            export ARM_SUBSCRIPTION_ID="$subscriptionId"

            tofu -chdir=infra/opentofu/container-app init \
              -backend-config="resource_group_name=$state_resource_group" \
              -backend-config="storage_account_name=$state_storage_account" \
              -backend-config="container_name=$state_storage_container" \
              -backend-config="key=$state_key" \
              -backend-config="use_azuread_auth=true"

            tofu -chdir=infra/opentofu/container-app apply \
              -auto-approve \
              -var="resource_group_name=$resource_group" \
              -var="location=$region" \
              -var="container_app_environment_name=$environment_name" \
              -var="container_app_name=$container_app_name" \
              -var="container_name=$container_name" \
              -var="container_image=$container_image" \
              -var="target_port=$target_port" \
              -var="ingress=$ingress" \
              -var="revision_suffix=$revision_suffix" \
              -var="registry_server=$registry_server" \
              -var="registry_username=$registry_username" \
              -var="registry_password=$registry_password"

            deployed_image="$(az containerapp show \
              --name "$container_app_name" \
              --resource-group "$resource_group" \
              --query 'properties.template.containers[0].image' \
              --output tsv)"

            if [[ "$deployed_image" != "$container_image" ]]; then
              echo "Deployed image mismatch for $container_app_name: expected $container_image, got $deployed_image" >&2
              exit 1
            fi

            deployed_target_port="$(az containerapp show \
              --name "$container_app_name" \
              --resource-group "$resource_group" \
              --query 'properties.configuration.ingress.targetPort' \
              --output tsv)"

            if [[ "$deployed_target_port" != "$target_port" ]]; then
              echo "Deployed target port mismatch for $container_app_name: expected $target_port, got $deployed_target_port" >&2
              exit 1
            fi
