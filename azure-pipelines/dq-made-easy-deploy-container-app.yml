# Purpose: Deploy any dq-made-easy Docker image to an existing Azure Container Apps environment with OpenTofu.
# What it does:
# - Selects the env-specific dq-made-easy parameter template.
# - Runs Build -> Test -> Publish -> Deploy stages.
# - Publishes image references to Docker Hub or an internal registry and deploys using the published reference.
# - Passes the selected environment, image, and ingress settings into the OpenTofu deployment job template.
# - Fails fast when required deploy inputs are missing.
# Version: 1.1
# Last modified: 2026-07-06

trigger: none
pr: none
name: dq-made-easy-deploy-container-app_$(Date:yyyyMMdd)$(Rev:.r)

parameters:
  - name: environment
    displayName: Environment
    type: string
    default: dev
    values:
      - dev
      - test
      - prod
  - name: containerAppName
    displayName: Container App name
    type: string
  - name: imageName
    displayName: Image name (namespace/repository)
    type: string
  - name: imageTag
    displayName: Image tag
    type: string
    default: latest
  - name: testCommand
    displayName: Test command
    type: string
    default: ./scripts/validate.sh
  - name: containerImage
    displayName: Optional explicit image ref override
    type: string
    default: ''
  - name: registryTarget
    displayName: Registry target
    type: string
    default: dockerhub
    values:
      - dockerhub
      - internal
  - name: targetPort
    displayName: Target port
    type: number
    default: 80
  - name: ingress
    displayName: Ingress
    type: string
    default: internal
    values:
      - internal
      - external
  - name: revisionSuffix
    displayName: Revision suffix
    type: string
    default: ''
  - name: containerName
    displayName: Container name
    type: string
    default: app
  - name: registryServer
    displayName: Registry server
    type: string
    default: ''
  - name: registryUsername
    displayName: Registry username
    type: string
    default: ''
  - name: registryPassword
    displayName: Registry password
    type: string
    default: ''

variables:
  - ${{ if eq(parameters.environment, 'dev') }}:
    - template: parameters/dq-made-easy-dev.yml
  - ${{ if eq(parameters.environment, 'test') }}:
    - template: parameters/dq-made-easy-test.yml
  - ${{ if eq(parameters.environment, 'prod') }}:
    - template: parameters/dq-made-easy-prod.yml

stages:
  - stage: Build
    displayName: dq-made-easy - Build
    jobs:
      - job: BuildImages
        displayName: dq-made-easy - Build images
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
          - bash: |
              set -euo pipefail

              image_name='${{ parameters.imageName }}'
              image_tag='${{ parameters.imageTag }}'
              env_name='${{ parameters.environment }}'

              if [[ -z "$image_name" ]]; then
                echo "imageName is required" >&2
                exit 1
              fi

              repo_name="${image_name##*/}"
              build_target=""
              case "$repo_name" in
                dq-made-easy-base) build_target="dq-base" ;;
                dq-made-easy-api) build_target="dq-api" ;;
                dq-made-easy-engine) build_target="dq-engine" ;;
                dq-made-easy-profiling) build_target="dq-profiling" ;;
                dq-made-easy-frontend) build_target="dq-frontend" ;;
                dq-made-easy-kong) build_target="dq-kong" ;;
                dq-made-easy-db) build_target="dq-db" ;;
                dq-made-easy-keycloak) build_target="dq-keycloak" ;;
                dq-made-easy-llm) build_target="dq-llm" ;;
                *)
                  echo "Unsupported imageName for scripted build: $image_name" >&2
                  echo "Supported repositories: dq-made-easy-{base,api,engine,profiling,frontend,kong,db,keycloak,llm}" >&2
                  exit 1
                  ;;
              esac

              ./scripts/build_and_push_one.sh "$build_target" --env "$env_name" --no-push --version "$image_tag"
            displayName: dq-made-easy - Validate build inputs

  - stage: Test
    displayName: dq-made-easy - Test
    dependsOn: Build
    jobs:
      - job: TestGates
        displayName: dq-made-easy - Test gates
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
          - bash: |
              set -euo pipefail
              test_command='${{ parameters.testCommand }}'
              if [[ -z "$test_command" ]]; then
                echo "testCommand is required" >&2
                exit 1
              fi
              bash -lc "$test_command"
            displayName: dq-made-easy - Run test gates

  - stage: Publish
    displayName: dq-made-easy - Publish to registry
    dependsOn: Test
    jobs:
      - job: PublishToRegistry
        displayName: dq-made-easy - Publish image
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
          - bash: |
              set -euo pipefail

              registry_target='${{ parameters.registryTarget }}'
              registry_server='${{ parameters.registryServer }}'
              image_name='${{ parameters.imageName }}'
              image_tag='${{ parameters.imageTag }}'
              image_digest=''
              explicit_image='${{ parameters.containerImage }}'

              case "$registry_target" in
                dockerhub)
                  registry_host="docker.io"
                  ;;
                internal)
                  if [[ -z "$registry_server" ]]; then
                    echo "registryServer is required when registryTarget=internal" >&2
                    exit 1
                  fi
                  registry_host="$registry_server"
                  ;;
                *)
                  echo "Unsupported registryTarget: $registry_target" >&2
                  exit 1
                  ;;
              esac

              if [[ -n "$explicit_image" ]]; then
                publish_image_ref="$explicit_image"
              else
                if [[ -z "$image_name" ]]; then
                  echo "imageName is required when containerImage override is not provided" >&2
                  exit 1
                fi

                source_image_ref="docker.io/${image_name}:${image_tag}"
                publish_image_ref="${registry_host}/${image_name}:${image_tag}"

                if [[ -n '${{ parameters.registryUsername }}' && -n '${{ parameters.registryPassword }}' ]]; then
                  printf '%s' '${{ parameters.registryPassword }}' | docker login "$registry_host" -u '${{ parameters.registryUsername }}' --password-stdin
                fi

                docker image inspect "$source_image_ref" >/dev/null 2>&1 || {
                  echo "Local build image not found: $source_image_ref" >&2
                  exit 1
                }

                docker tag "$source_image_ref" "$publish_image_ref"
                docker push "$publish_image_ref"

                digest_ref="$(docker image inspect --format='{{index .RepoDigests 0}}' "$publish_image_ref" 2>/dev/null || true)"
                if [[ -n "$digest_ref" ]]; then
                  publish_image_ref="$digest_ref"
                fi
              fi

              echo "Publish target image: $publish_image_ref"

              echo "##vso[task.setvariable variable=DEPLOY_IMAGE_REF;isOutput=true]${publish_image_ref}"
            name: PublishImage
            displayName: dq-made-easy - Resolve and publish image reference

  - stage: Deploy
    displayName: dq-made-easy - Deploy Container App
    dependsOn: Publish
    variables:
      DEPLOY_IMAGE_REF: $[ stageDependencies.Publish.PublishToRegistry.outputs['PublishImage.DEPLOY_IMAGE_REF'] ]
    jobs:
      - template: templates/dq-made-easy-container-app-deploy-tofu.yml
        parameters:
          containerAppName: ${{ parameters.containerAppName }}
          containerImage: $(DEPLOY_IMAGE_REF)
          targetPort: ${{ parameters.targetPort }}
          ingress: ${{ parameters.ingress }}
          revisionSuffix: ${{ parameters.revisionSuffix }}
          containerName: ${{ parameters.containerName }}
          registryServer: ${{ parameters.registryServer }}
          registryUsername: ${{ parameters.registryUsername }}
          registryPassword: ${{ parameters.registryPassword }}
      - template: templates/dq-made-easy-container-app-smoke.yml
        parameters:
          dependsOn: DeployContainerApp
          containerAppName: ${{ parameters.containerAppName }}
          expectedImage: $(DEPLOY_IMAGE_REF)
          expectedTargetPort: ${{ parameters.targetPort }}
          expectedIngress: ${{ parameters.ingress }}
          evidencePath: $(acaEvidencePath)
