                state_key='$(stateKeyPrefix)/environment.tfstate'
                tofu_version='${{ parameters.openTofuVersion }}'

                if [[ -z "$resource_group" || -z "$region" || -z "$environment_name" || -z "$workspace_name" || -z "$state_resource_group" || -z "$state_storage_account" || -z "$state_storage_container" ]]; then
                  echo "Required dq-made-easy pipeline variables are missing" >&2
