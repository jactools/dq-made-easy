server {
  listen 80;
  server_name _;
  absolute_redirect off;

  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  server_name _;
  absolute_redirect off;

  ssl_certificate /etc/nginx/certs/dq-made-easy.jac.dot+3.pem;
  ssl_certificate_key /etc/nginx/certs/dq-made-easy.jac.dot+3-key.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  location = /runtime-config.js {
    root /usr/share/nginx/html;
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
    try_files $uri =404;
  }

  # serve OpenAPI docs and spec files
  location /openapi/ {
    root /usr/share/nginx/html;
    index index.html index.json;
    add_header Access-Control-Allow-Origin "*" always;
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    try_files $uri $uri/ $uri/index.html $uri/index.json =404;
  }

  location = /docs {
    return 301 /docs/;
  }

  # serve the public documentation portal
  location ^~ /docs/ {
    root /usr/share/nginx/html;
    index index.html;
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    try_files $uri $uri/ $uri/index.html =404;
  }

  # serve published user manuals as static HTML with extensionless fallbacks
  location ^~ /user-manuals/ {
    root /usr/share/nginx/html;
    index index.html;
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    try_files $uri $uri/ $uri.html $uri/index.html =404;
  }

  # serve SPA
  location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri $uri/ /index.html;
  }

  # preserve the browser-facing path for UI registry so Kong can forward it to the internal API surface
  location ^~ /api/system/v1/ui-registry {
    proxy_pass http://kong:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
  }

  # proxy API requests to the api service on the docker network
  location /api {
    rewrite ^/api(?=/|$) / break;
    proxy_pass http://kong:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
  }

  # proxy browser OTLP exports to the local collector without exposing its port to the UI
  location ^~ /observability/otlp/ {
    proxy_pass http://dq-made-easy-otel-collector:4318/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
  }

  # Optional: increase buffer for larger JSON payloads
  client_max_body_size 10M;
}
