# Zammad TLS termination at this nginx; backends speak plain HTTP internally.
# Uses dynamic resolver so recreated containers resolve immediately.
map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name _;

  # Docker DNS with short TTL for container recreation resilience
  resolver 127.0.0.11 ipv6=off valid=5s;
  resolver_timeout 3s;

  ssl_certificate /tmp/zammad-origin-certs/zammad-origin.crt;
  ssl_certificate_key /tmp/zammad-origin-certs/zammad-origin.key;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  client_max_body_size 50M;

  location /ws {
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "Upgrade";
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_read_timeout 86400;
    # Dynamic upstream via variable (nginx < 1.27 workaround)
    set $zammad_websocket_url http://zammad-websocket:6042;
    proxy_pass $zammad_websocket_url;
  }

  location /cable {
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "Upgrade";
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_read_timeout 86400;
    # Dynamic upstream via variable (nginx < 1.27 workaround)
    set $zammad_railsserver_url http://zammad-railsserver:3000;
    proxy_pass $zammad_railsserver_url;
  }

  location / {
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 300;
    # Dynamic upstream via variable (nginx < 1.27 workaround)
    set $zammad_railsserver_url http://zammad-railsserver:3000;
    proxy_pass $zammad_railsserver_url;

    gzip on;
    gzip_types text/plain text/xml text/css image/svg+xml application/javascript application/x-javascript application/json application/xml;
    gzip_proxied any;
  }
}