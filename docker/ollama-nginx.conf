server {
  listen 8443 ssl http2;
  listen [::]:8443 ssl http2;
  server_name ollama-nginx;

  ssl_certificate /etc/nginx/certs/tls.crt;
  ssl_certificate_key /etc/nginx/certs/tls.key;
  ssl_client_certificate /etc/nginx/certs/mkcert-rootCA.pem;
  ssl_verify_client on;
  ssl_verify_depth 1;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  location / {
    proxy_ssl_server_name on;
    proxy_ssl_name dq-made-easy-llm;
    proxy_ssl_verify on;
    proxy_ssl_verify_depth 1;
    proxy_ssl_trusted_certificate /etc/nginx/certs/mkcert-rootCA.pem;
    proxy_pass https://dq-made-easy-llm:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP $remote_addr;
  }
}