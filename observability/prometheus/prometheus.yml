global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: dq-rulebuilder
    environment: dev
    region: local

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []
          # - 'alertmanager:9093'

# Load rules once and periodically evaluate them
rule_files:
  - "alerts.yml"
  # - "recording_rules.yml"

# ============================================================================
# Scrape Configurations
# ============================================================================

scrape_configs:
  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["observability.jac.dot:9090"]

  # ========================================================================
  # OpenTelemetry Collector Prometheus Exporter
  # ========================================================================
  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8889"]
        labels:
          service: otel-collector
          component: telemetry-pipeline
    scrape_interval: 15s
    scrape_timeout: 10s

  # ========================================================================
  # DQ-Engine Service
  # ========================================================================
  - job_name: "dq-engine"
    static_configs:
      - targets: ["dq-engine:8000"]
        labels:
          service: dq-engine
          component: execution-engine
    metrics_path: "/metrics"
    scrape_interval: 15s
    scrape_timeout: 10s

  # ========================================================================
  # DQ-API Service
  # ========================================================================
  - job_name: "dq-api"
    static_configs:
      - targets: ["api:4010"]
        labels:
          service: dq-api
          component: api
    metrics_path: "/metrics"
    bearer_token_file: "/etc/prometheus/bearer_token"
    scrape_interval: 15s
    scrape_timeout: 10s

  # ========================================================================
  # DQ-Profiling Worker
  # ========================================================================
  - job_name: "dq-profiling"
    static_configs:
      - targets: ["profiling-worker:8001"]
        labels:
          service: dq-profiling
          component: profiling-worker
    metrics_path: "/metrics"
    scrape_interval: 15s
    scrape_timeout: 10s

  # ========================================================================
  # DQ-LLM Service
  # ========================================================================
  - job_name: "dq-llm"
    static_configs:
      - targets: ["dq-llm:8000"]
        labels:
          service: dq-llm
          component: llm
    metrics_path: "/metrics"
    scrape_interval: 15s
    scrape_timeout: 10s

  # ========================================================================
  # AIStor (built-in object-storage Prometheus metrics)
  # ========================================================================
  - job_name: "aistor"
    static_configs:
      - targets: ["aistor:9000"]
        labels:
          service: aistor
          component: object-storage
    metrics_path: "/minio/v2/metrics/cluster"
    scrape_interval: 15s
    scrape_timeout: 10s

  # ========================================================================
  # PostgreSQL Exporter (if deployed)
  # ========================================================================
  - job_name: "postgres"
    static_configs:
      - targets: ["dq-db-postgres-exporter:9187"]
        labels:
          service: dq-db
          component: database
      - targets: ["kong-postgres-exporter:9187"]
        labels:
          service: kong-db
          component: database
      - targets: ["openmetadata-db-postgres-exporter:9187"]
        labels:
          service: openmetadata-db
          component: database
    scrape_interval: 15s
    scrape_timeout: 5s
    # Uncomment if postgres_exporter is running as sidecar:
    # static_configs:
    #   - targets: ["observability.jac.dot:9187"]

  # ========================================================================
  # Redis Exporter (if deployed)
  # ========================================================================
  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]
        labels:
          service: redis
          component: cache
    scrape_interval: 15s
    scrape_timeout: 5s
    # Uncomment if redis_exporter is running as sidecar:
    # static_configs:
    #   - targets: ["observability.jac.dot:9121"]

  # ========================================================================
  # Loki Service (collect Loki metrics)
  # ========================================================================
  - job_name: "loki"
    static_configs:
      - targets: ["loki:3100"]
        labels:
          service: loki
          component: log-aggregation
    metrics_path: "/metrics"
    scrape_interval: 15s

  # ========================================================================
  # Tempo Service (collect Tempo metrics)
  # ========================================================================
  - job_name: "tempo"
    static_configs:
      - targets: ["tempo:3200"]
        labels:
          service: tempo
          component: tracing
    metrics_path: "/metrics"
    scrape_interval: 15s

  # ========================================================================
  # Grafana Service (collect Grafana metrics)
  # ========================================================================
  - job_name: "grafana"
    static_configs:
      - targets: ["grafana:3000"]
        labels:
          service: grafana
          component: dashboards
    metrics_path: "/metrics"
    scrape_interval: 15s

  # ========================================================================
  # Container Metrics Exporter (compose service counts)
  # ========================================================================
  - job_name: "container-metrics"
    static_configs:
      - targets: ["container-metrics:8000"]
        labels:
          service: container-metrics
          component: container-observability
    metrics_path: "/metrics"
    scrape_interval: 15s

  # ========================================================================
  # Pushgateway (for batch/ephemeral job metrics)
  # ========================================================================
  - job_name: "pushgateway"
    static_configs:
      - targets: ["pushgateway:9091"]
        labels:
          service: pushgateway
          component: metrics-gateway
    # Honor labels from pushgateway-submitted metrics
    honor_labels: true
    scrape_interval: 15s

  # ========================================================================
  # Service Discovery via Docker (optional, requires SD)
  # ========================================================================
  # - job_name: "docker"
  #   docker_sd_configs:
  #     - host: unix:///var/run/docker.sock
  #   relabel_configs:
  #     - source_labels: [__meta_docker_container_name]
  #       target_label: container_name
  #     - source_labels: [__meta_docker_container_label_monitoring]
  #       regex: "true"
  #       action: keep
