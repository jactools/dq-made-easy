apiVersion: 1

deleteDatasources:
  - name: Prometheus
    orgId: 1
  - name: Tempo
    orgId: 1
  - name: Loki
    orgId: 1
  - name: Infinity
    orgId: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    uid: prometheus
    jsonData:
      timeInterval: 15s

  - name: Tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    isDefault: false
    editable: true
    uid: tempo
    jsonData:
      nodeGraph:
        enabled: true
      serviceMap:
        enabled: true
      searchEnabled: true

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    editable: true
    uid: loki

  - name: Infinity
    type: yesoreyeram-infinity-datasource
    access: proxy
    url: http://kong:8000
    isDefault: false
    editable: true
    uid: infinity
    jsonData:
      auth_method: oauth2
      oauth2:
        oauth2_type: client_credentials
        client_id: grafana
        token_url: http://keycloak:8080/realms/jaccloud/protocol/openid-connect/token
      allowedHosts:
        - http://kong:8000
        - http://keycloak:8080
    secureJsonData:
      oauth2ClientSecret: ${GRAFANA_OIDC_SECRET}
