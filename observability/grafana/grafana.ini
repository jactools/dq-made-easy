[server]
# Listen on all interfaces inside the container so Docker can route traffic to it
http_addr = 0.0.0.0
http_port = 3000
# Public hostname, root_url, and subpath mode are injected via GF_SERVER_* env vars in docker-compose.

[security]
admin_user = admin
disable_brute_force_login_protection = false

[users]
allow_sign_up = false

[analytics]
reporting_enabled = false
check_for_updates = false
check_for_plugin_updates = false

[news]
news_feed_enabled = false

[plugins]
public_key_retrieval_disabled = true
plugin_admin_enabled = false

[log]
mode = console file
level = info

[log.file]
level = info
format = text
log_rotate = true
max_size_shift = 28
max_days = 30
max_lines = 1000000

[audit]
enabled = true
log_path = /var/lib/grafana/audit/audit.log
log_maxsize = 100
log_maxDays = 30
log_maxBackups = 10
