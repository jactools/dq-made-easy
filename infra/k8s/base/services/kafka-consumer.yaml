apiVersion: apps/v1
kind: Deployment
metadata:
  name: dq-kafka-consumer
  labels:
    app.kubernetes.io/name: dq-kafka-consumer
    app.kubernetes.io/part-of: dq-made-easy
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dq-kafka-consumer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dq-kafka-consumer
        app.kubernetes.io/part-of: dq-made-easy
    spec:
      containers:
        - name: dq-kafka-consumer
          image: docker.io/jacbeekers/dq-made-easy-kafka-consumer:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 9100
              name: metrics
          envFrom:
            - configMapRef:
                name: dq-common-config
            - configMapRef:
                name: dq-kafka-consumer-config
            - secretRef:
                name: dq-kafka-consumer-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: dq-kafka-consumer
  labels:
    app.kubernetes.io/name: dq-kafka-consumer
    app.kubernetes.io/part-of: dq-made-easy
spec:
  selector:
    app.kubernetes.io/name: dq-kafka-consumer
  ports:
    - name: metrics
      port: 9100
      targetPort: metrics
