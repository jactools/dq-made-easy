apiVersion: apps/v1
kind: Deployment
metadata:
  name: dq-kafka
  labels:
    app.kubernetes.io/name: dq-kafka
    app.kubernetes.io/part-of: dq-made-easy
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dq-kafka
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dq-kafka
        app.kubernetes.io/part-of: dq-made-easy
    spec:
      containers:
        - name: dq-kafka
          image: docker.io/jacbeekers/dq-made-easy-kafka:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 9092
              name: kafka
          envFrom:
            - configMapRef:
                name: dq-common-config
            - configMapRef:
                name: dq-kafka-config
            - secretRef:
                name: dq-kafka-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: dq-kafka
  labels:
    app.kubernetes.io/name: dq-kafka
    app.kubernetes.io/part-of: dq-made-easy
spec:
  selector:
    app.kubernetes.io/name: dq-kafka
  ports:
    - name: kafka
      port: 9092
      targetPort: kafka
