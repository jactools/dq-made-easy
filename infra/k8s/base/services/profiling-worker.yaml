apiVersion: apps/v1
kind: Deployment
metadata:
  name: dq-profiling
  labels:
    app.kubernetes.io/name: dq-profiling
    app.kubernetes.io/part-of: dq-made-easy
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dq-profiling
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dq-profiling
        app.kubernetes.io/part-of: dq-made-easy
    spec:
      containers:
        - name: dq-profiling
          image: docker.io/jacbeekers/dq-made-easy-profiling:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8001
              name: metrics
          envFrom:
            - configMapRef:
                name: dq-common-config
            - configMapRef:
                name: dq-profiling-config
            - secretRef:
                name: dq-profiling-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: dq-profiling
  labels:
    app.kubernetes.io/name: dq-profiling
    app.kubernetes.io/part-of: dq-made-easy
spec:
  selector:
    app.kubernetes.io/name: dq-profiling
  ports:
    - name: metrics
      port: 8001
      targetPort: metrics
