apiVersion: apps/v1
kind: Deployment
metadata:
  name: dq-kong
  labels:
    app.kubernetes.io/name: dq-kong
    app.kubernetes.io/part-of: dq-made-easy
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dq-kong
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dq-kong
        app.kubernetes.io/part-of: dq-made-easy
    spec:
      containers:
        - name: dq-kong
          image: docker.io/jacbeekers/dq-made-easy-kong:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8443
              name: proxy-https
            - containerPort: 8001
              name: admin
            - containerPort: 8002
              name: manager
          envFrom:
            - configMapRef:
                name: dq-common-config
            - configMapRef:
                name: dq-kong-config
            - secretRef:
                name: dq-kong-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: dq-kong
  labels:
    app.kubernetes.io/name: dq-kong
    app.kubernetes.io/part-of: dq-made-easy
spec:
  selector:
    app.kubernetes.io/name: dq-kong
  ports:
    - name: proxy-https
      port: 8443
      targetPort: proxy-https
    - name: admin
      port: 8001
      targetPort: admin
    - name: manager
      port: 8002
      targetPort: manager
