apiVersion: batch/v1
kind: Job
metadata:
  name: dq-job-kong-migrate
  labels:
    app.kubernetes.io/name: dq-job-kong-migrate
    app.kubernetes.io/part-of: dq-made-easy
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dq-job-kong-migrate
        app.kubernetes.io/part-of: dq-made-easy
    spec:
      restartPolicy: Never
      containers:
        - name: kong-migrate
          image: docker.io/jacbeekers/dq-made-easy-kong:latest
          imagePullPolicy: Always
          command: ["kong", "migrations", "bootstrap"]
          envFrom:
            - configMapRef:
                name: dq-common-config
            - configMapRef:
                name: dq-kong-config
            - secretRef:
                name: dq-kong-secrets
