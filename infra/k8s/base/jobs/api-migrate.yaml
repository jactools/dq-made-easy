apiVersion: batch/v1
kind: Job
metadata:
  name: dq-job-api-migrate
  labels:
    app.kubernetes.io/name: dq-job-api-migrate
    app.kubernetes.io/part-of: dq-made-easy
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dq-job-api-migrate
        app.kubernetes.io/part-of: dq-made-easy
    spec:
      restartPolicy: Never
      containers:
        - name: api-migrate
          image: docker.io/jacbeekers/dq-made-easy-api:latest
          imagePullPolicy: Always
          command: ["/bin/sh", "-lc"]
          args:
            - cd /app && python -m alembic -c alembic.ini upgrade heads
          envFrom:
            - configMapRef:
                name: dq-common-config
            - configMapRef:
                name: dq-api-config
            - secretRef:
                name: dq-api-secrets
